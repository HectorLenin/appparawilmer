function SplashScreen({ onDone }) {
  useEffect(()=>{
    const t = setTimeout(onDone, 2200);
    return ()=>clearTimeout(t);
  },[]);
  return(
    <div style={{
      minHeight:"100vh", background:"#0f1a0f",
      display:"flex", alignItems:"center", justifyContent:"center",
      flexDirection:"column", gap:20,
      fontFamily:"'Source Sans 3',sans-serif",
      animation:"splashFadeIn .5s ease"
    }}>
      <style>{`
        @keyframes splashFadeIn{from{opacity:0}to{opacity:1}}
        @keyframes splashFadeOut{from{opacity:1}to{opacity:0}}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}`
      }</style>
      <div style={{
        width:260, height:120, borderRadius:"16px",
        border:"2px solid #c9a84c",
        overflow:"hidden",
        boxShadow:"0 0 30px rgba(201,168,76,.35)",
        background:"white", padding:"10px",
        animation:"pulse 1.8s ease-in-out infinite"
      }}>
        <img src={LOGO_B64} alt="Logo" style={{width:"100%",height:"100%",objectFit:"contain"}}/>
      </div>
      <div style={{fontFamily:"Playfair Display,serif",fontSize:"1.6rem",color:"#c9a84c",letterSpacing:1}}>
        SolaresHN
      </div>
      <div style={{fontSize:".78rem",color:"#6b8a6b"}}>
        Ciudad Nuevo Pescadero
      </div>
      <div style={{display:"flex",gap:6,marginTop:8}}>
        {[0,1,2].map(i=>(
          <div key={i} style={{
            width:7,height:7,borderRadius:"50%",
            background:"#c9a84c",
            opacity: 0.3,
            animation:`pulse ${1.2+i*.2}s ease-in-out infinite`,
            animationDelay:`${i*.15}s`
          }}/>
        ))}
      </div>
    </div>
  );
}

const PIN_KEY = "hn_pin";
const SESSION_KEY = "hn_session";

function getStoredPin() {
  try {
    // Leer de localStorage primero, luego de cookie como respaldo
    const ls = localStorage.getItem(PIN_KEY);
    if (ls) return ls;
    const m = document.cookie.match(/(?:^|; )hn_pin=([^;]*)/);
    return m ? decodeURIComponent(m[1]) : null;
  } catch { return null; }
}
function setStoredPin(pin) {
  // Guardar en localStorage Y en cookie (para mayor persistencia en APK)
  try { localStorage.setItem(PIN_KEY, pin); } catch {}
  try {
    const exp = new Date(Date.now() + 365*24*60*60*1000).toUTCString();
    document.cookie = "hn_pin=" + encodeURIComponent(pin) + ";expires=" + exp + ";path=/;SameSite=Strict";
  } catch {}
}
function checkPin(pin) {
  const stored = getStoredPin();
  return !!stored && pin === stored;
}
function isSessionActive() {
  try {
    const t = localStorage.getItem(SESSION_KEY);
    if (!t) return false;
    return (Date.now() - Number(t)) < 8 * 60 * 60 * 1000; // 8 horas
  } catch { return false; }
}
function markSession() {
  try { localStorage.setItem(SESSION_KEY, String(Date.now())); } catch {}
}
function clearSession() {
  try { localStorage.removeItem(SESSION_KEY); } catch {}
}

function PinScreen({ onUnlock }) {
  const storedPin = getStoredPin();
  const isSetup = !storedPin;
  const [step,    setStep]   = useState(isSetup ? "setup" : "enter"); // setup | confirm | enter
  const [pin,     setPin]    = useState("");
  const [confirm, setConfirm]= useState("");
  const [error,   setError]  = useState("");
  const [newPin,  setNewPin] = useState("");

  const handleDigit = (d) => {
    if (step === "enter") {
      const next = pin + d;
      setPin(next);
      if (next.length === 4) {
        if (checkPin(next)) { markSession(); onUnlock(); }
        else { setError("PIN incorrecto"); setTimeout(() => { setPin(""); setError(""); }, 900); }
      }
    } else if (step === "change") {
      const next = pin + d;
      setPin(next);
      if (next.length === 4) {
        if (checkPin(next)) { setPin(""); setStep("setup"); setError(""); }
        else { setError("PIN actual incorrecto"); setTimeout(() => { setPin(""); setError(""); setStep("enter"); }, 900); }
      }
    } else if (step === "setup") {
      const next = pin + d;
      setPin(next);
      if (next.length === 4) { setNewPin(next); setPin(""); setStep("confirm"); }
    } else if (step === "confirm") {
      const next = confirm + d;
      setConfirm(next);
      if (next.length === 4) {
        if (next === newPin) { setStoredPin(newPin); markSession(); onUnlock(); }
        else { setError("No coinciden"); setTimeout(() => { setConfirm(""); setError(""); setStep("setup"); setPin(""); setNewPin(""); }, 900); }
      }
    }
  };

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA   return (
    <div style={{ minHeight:"100vh", background:"#0f1a0f", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:20, padding:24, fontFamily:"'Source Sans 3',sans-serif" }}>
      <div style={{ width:180, height:90, borderRadius:"12px", overflow:"hidden", border:"2px solid #c9a84c", boxShadow:"0 0 30px rgba(201,168,76,0.35)", background:"white", padding:"6px" }}>
        <img src={FOTO} alt="Logo" style={{ width:"100%", height:"100%", objectFit:"cover", objectPosition:"top" }}/>
      </div>
      <div style={{ fontFamily:"Playfair Display,serif", fontSize:"1.4rem", color:"#c9a84c", textAlign:"center" }}>SolaresHN</div>
      <div style={{ fontSize:"0.85rem", color:"#6b8a6b", textAlign:"center" }}>{title}</div>

      {/* Dots */}
      <div style={{ display:"flex", gap:14 }}>
        {[0,1,2,3].map(i => (
          <div key={i} style={{ width:16, height:16, borderRadius:"50%", background: i < current.length ? "#c9a84c" : "transparent", border:"2px solid #c9a84c", transition:"background .15s" }}/>
        ))}
      </div>

      {error && <div style={{ color:"#e05252", fontSize:"0.82rem", fontWeight:700 }}>{error}</div>}

      {/* Keypad */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12, maxWidth:260, width:"100%" }}>
        {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((d, i) => (
          <button key={i} onClick={() => d === "⌫" ? handleDel() : d !== "" ? handleDigit(String(d)) : null}
            style={{ padding:"18px 0", borderRadius:12, border:"1px solid #2e4a2e", background: d === "⌫" ? "transparent" : "#1c2b1c", color: d === "⌫" ? "#e05252" : "#dde8dd", fontSize:"1.3rem", fontWeight:700, cursor: d === "" ? "default" : "pointer", opacity: d === "" ? 0 : 1, fontFamily:"inherit" }}>
            {d}
          </button>
        ))}
      </div>
      {step === "enter" && (
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:8, marginTop:8 }}>
          <button onClick={()=>{setStep("change");setPin("");setError("");}}
            style={{ background:"none", border:"1px solid #2e4a2e", color:"#6b8a6b", fontSize:"0.75rem", borderRadius:8, padding:"6px 16px", cursor:"pointer" }}>
            🔑 Cambiar PIN
          </button>
          <div style={{ fontSize:"0.7rem", color:"#4a6a4a", textAlign:"center" }}>
            ¿Olvidaste tu PIN? Borra el caché del navegador para crear uno nuevo.
          </div>
        </div>
      )}
      {step === "change" && (
        <div style={{ fontSize:"0.78rem", color:"#c9a84c", textAlign:"center", marginTop:4 }}>
          Ingresa tu PIN actual para continuar

/* ══════════════════════════════════════════════════
   STORAGE — funciona en Claude Y en deploy real
══════════════════════════════════════════════════ */
async function dbLoad(key) {
  try {
    const v = localStorage.getItem(key);
    if (v) return JSON.parse(v);
    // Respaldo: cookie (útil en algunos WebViews de APK)
    const m = document.cookie.match(new RegExp("(?:^|; )" + key.replace(/[-[\]{}()*+?.,\\^$|#\s]/g,"\\$&") + "=([^;]*)"));
    return m ? JSON.parse(decodeURIComponent(m[1])) : [];
  } catch { return []; }
}
async function dbSave(key, data) {
  try {
    const str = JSON.stringify(data);
    // Guardar en localStorage (principal)
    localStorage.setItem(key, str);
    // Respaldo en cookie para APK WebView
    try {
      const exp = new Date(Date.now() + 365*24*60*60*1000).toUTCString();
      document.cookie = key + "=" + encodeURIComponent(str) + ";expires=" + exp + ";path=/;SameSite=Strict";
    } catch {}
  } catch(e) { console.error(e); }
}

const uid     = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const today   = () => new Date().toISOString().slice(0,10);
const fmtL    = (n) => `L. ${Number(n||0).toLocaleString("es-HN",{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const fmtDate = (d) => d ? new Date(d+"T12:00:00").toLocaleDateString("es-HN",{day:"2-digit",month:"2-digit",year:"numeric"}) : "—";
const addMonths = (ds,n) => { const d=new Date(ds+"T12:00:00"); d.setMonth(d.getMonth()+n); return d.toISOString().slice(0,10); };
const daysDiff  = (ds) => { const d=new Date(ds+"T12:00:00"); const n=new Date(); n.setHours(0,0,0,0); return Math.ceil((d-n)/86400000); };
const generarCuotas = (v) => {
  if(!v||!v.numCuotas||!v.fechaInicio) return [];
  return Array.from({length:Number(v.numCuotas)},(_,i)=>({
    num:i+1, fecha:addMonths(v.fechaInicio,i+1), monto:Number(v.montoCuota)
  }));
};
const calcCuotaFn = (precio,prima,nc,interes) => {
  const s = Number(precio||0)-Number(prima||0);
  const n = Number(nc||1);
  const i = Number(interes||0);
  if(i>0){ const r=i/100/12; const c=s*r/(1-Math.pow(1+r,-n)); return isFinite(c)?c.toFixed(2):"0"; }
  return n>0?(s/n).toFixed(2):"0";
};

/* ══════════════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════════════ */
function App() {
  const [tab,      setTab]      = useState("dashboard");
  const [clientes, setClientes] = useState([]);
  const [lotes,    setLotes]    = useState([]);
  const [ventas,   setVentas]   = useState([]);
  const [pagos,    setPagos]    = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [unlocked, setUnlocked] = useState(false);
  const [splashDone, setSplashDone] = useState(false);

  useEffect(()=>{
    if(isSessionActive()) setUnlocked(true);
  },[]);

  useEffect(()=>{
    (async()=>{
      const [c,l,v,p] = await Promise.all([
        dbLoad("hn_clientes"),dbLoad("hn_lotes"),dbLoad("hn_ventas"),dbLoad("hn_pagos")
      ]);
      setClientes(c); 
      if((!l || l.length===0) && typeof SAN_LORENZO_LOTES!=="undefined"){
        setLotes(SAN_LORENZO_LOTES);
        dbSave("hn_lotes",SAN_LORENZO_LOTES);
      }else{
        setLotes(l);
      }
      setVentas(v); setPagos(p);
      setLoading(false);
    })();
  },[]);

  const saveClientes = d=>{setClientes(d);dbSave("hn_clientes",d);};
  const saveLotes    = d=>{setLotes(d);   dbSave("hn_lotes",d);};
  const saveVentas   = d=>{setVentas(d);  dbSave("hn_ventas",d);};
  const savePagos    = d=>{setPagos(d);   dbSave("hn_pagos",d);};

  const handleExport = () => {
    const data = { clientes, lotes, ventas, pagos, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type:"application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = `SolaresHN_backup_${today()}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  const handleImport = () => {
    const input = document.createElement("input");
    input.type = "file"; input.accept = ".json";
    input.onchange = e => {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const d = JSON.parse(ev.target.result);
          if (!confirm(`¿Restaurar backup?\nClientes: ${d.clientes?.length||0}, Lotes: ${d.lotes?.length||0}, Contratos: ${d.ventas?.length||0}, Pagos: ${d.pagos?.length||0}\n\nEsto REEMPLAZA los datos actuales.`)) return;
          if (d.clientes) saveClientes(d.clientes);
          if (d.lotes)    saveLotes(d.lotes);
          if (d.ventas)   saveVentas(d.ventas);
          if (d.pagos)    savePagos(d.pagos);
          alert("✅ Datos restaurados correctamente.");
        } catch { alert("❌ Archivo inválido."); }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  if (!splashDone) return <SplashScreen onDone={()=>setSplashDone(true)} />;
  if (!unlocked) return <PinScreen onUnlock={()=>setUnlocked(true)} />;

  if(loading) return(
    <>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}body{background:#0f1a0f;font-family:sans-serif;}`}</style>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:16}}>
        <div style={{width:44,height:44,border:"3px solid #2e4a2e",borderTopColor:"#c9a84c",borderRadius:"50%",animation:"spin .8s linear infinite"}}/>
        <p style={{color:"#6b8a6b",fontSize:"0.85rem"}}>Cargando SolaresHN...</p>
      </div>
    </>
  );

  const props={clientes,lotes,ventas,pagos,saveClientes,saveLotes,saveVentas,savePagos};
  return(
    <>
      <style>{STYLE}</style>
      <div className="app-root">
        <header className="app-header no-print">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <img src={LOGO_B64} alt="Villa Panamericana" style={{height:46,objectFit:"contain",background:"white",borderRadius:10,padding:"4px 8px",flexShrink:0}}/>
              <div>
                <h1 style={{fontSize:"1.1rem"}}>SolaresHN</h1>
                <p>Control de Lotes y Ventas · Honduras</p>
              </div>
            </div>
            <div style={{display:"flex",gap:7}}>
              <button title="Exportar backup" onClick={handleExport}
                style={{background:"none",border:"1px solid #2e4a2e",borderRadius:8,padding:"6px 9px",color:"#6b8a6b",cursor:"pointer",fontSize:"1rem",lineHeight:1}}>💾</button>
              <button title="Importar backup" onClick={handleImport}
                style={{background:"none",border:"1px solid #2e4a2e",borderRadius:8,padding:"6px 9px",color:"#6b8a6b",cursor:"pointer",fontSize:"1rem",lineHeight:1}}>📂</button>
              <button title="Bloquear app" onClick={()=>{clearSession();setUnlocked(false);}}
                style={{background:"none",border:"1px solid #2e4a2e",borderRadius:8,padding:"6px 9px",color:"#6b8a6b",cursor:"pointer",fontSize:"1rem",lineHeight:1}}>🔒</button>
            </div>
          </div>
        </header>
        <main className="main fade-in">
          {tab==="dashboard" && <Dashboard {...props} setTab={setTab}/>}
          {tab==="clientes"  && <Clientes  {...props}/>}
          {tab==="lotes"     && <Lotes     {...props}/>}
          {tab==="ventas"    && <Ventas    {...props}/>}
          {tab==="pagos"     && <PagosView {...props}/>}
        </main>
        <nav className="bottom-nav no-print">
          {[
            {id:"dashboard",icon:IC.home,   label:"Inicio"},
            {id:"clientes", icon:IC.clients,label:"Clientes"},
            {id:"lotes",    icon:IC.lote,   label:"Lotes"},
            {id:"ventas",   icon:IC.venta,  label:"Ventas"},
            {id:"pagos",    icon:IC.pago,   label:"Pagos"},
          ].map(({id,icon,label})=>(
            <button key={id} className={`nav-btn${tab===id?" active":""}`} onClick={()=>setTab(id)}>
              <Svg path={icon} size={22}/><span>{label}</span>
            </button>
          ))}
        </nav>
      </div>
    </>
  );
}


/* ══════════════════════════════════════════════════
   IMPORTAR LOTES SAN LORENZO 3 — Editor Masivo
══════════════════════════════════════════════════ */
function ImportLotesSL3({ lotes, saveLotes, onClose }) {
  const [filas, setFilas] = useState(() =>
    SAN_LORENZO_LOTES.map((l, i) => ({ ...l, _id: i, activo: true }))
  );
  const [precio, setPrecio] = useState("0");
  const [medida, setMedida] = useState("150");
  const [unidad, setUnidad] = useState("varas²");
  const [applied, setApplied] = useState(false);

  const applyGlobal = () => {
    setFilas(f => f.map(r => ({
      ...r,
      precio: precio || r.precio,
      medida: medida || r.medida,
      unidad: unidad || r.unidad,
    })));
    setApplied(true);
  };

  const updateFila = (id, field, val) => {
    setFilas(f => f.map(r => r._id === id ? { ...r, [field]: val } : r));
  };

  const toggleFila = (id) => {
    setFilas(f => f.map(r => r._id === id ? { ...r, activo: !r.activo } : r));
  };

  const handleImport = () => {
    const seleccionados = filas.filter(r => r.activo);
    if (seleccionados.length === 0) return alert("Selecciona al menos un lote");
    
    // Verificar duplicados
    const duplicados = seleccionados.filter(r =>
      lotes.some(l => l.numero === r.numero && l.manzana === r.manzana && l.proyecto === r.proyecto)
    );
    if (duplicados.length > 0) {
      const lista = duplicados.slice(0,5).map(d => `Lote ${d.numero} M.${d.manzana}`).join(", ");
      if (!confirm(`⚠️ ${duplicados.length} lote(s) ya existen (${lista}...)\n¿Continuar e importar solo los nuevos?`)) return;
    }
    
    const nuevos = seleccionados
      .filter(r => !lotes.some(l => l.numero === r.numero && l.manzana === r.manzana && l.proyecto === r.proyecto))
      .map(({ _id, activo, ...rest }) => ({ ...rest, id: uid(), createdAt: today() }));
    
    if (nuevos.length === 0) return alert("Todos los lotes seleccionados ya existen.");
    
    saveLotes([...lotes, ...nuevos]);
    alert(`✅ ${nuevos.length} lotes importados correctamente.`);
    onClose();
  };

  const manzanas = [...new Set(filas.map(r => r.manzana))].sort();
  const activos = filas.filter(r => r.activo).length;

  return (
    <div>
      {/* Panel de aplicación masiva */}
      <div className="card" style={{borderColor:"var(--blue)",padding:12,marginBottom:12}}>
        <div style={{fontSize:".72rem",color:"var(--blue)",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",marginBottom:8}}>
          ⚡ Aplicar a todos los lotes
        </div>
        <div className="form-row">
          <div className="form-group" style={{marginBottom:6}}>
            <label>Medida</label>
            <input type="number" value={medida} onChange={e=>setMedida(e.target.value)} placeholder="150"/>
          </div>
          <div className="form-group" style={{marginBottom:6}}>
            <label>Unidad</label>
            <select value={unidad} onChange={e=>setUnidad(e.target.value)}>
              <option>varas²</option><option>m²</option><option>manzanas</option>
            </select>
          </div>
        </div>
        <div className="form-group" style={{marginBottom:8}}>
          <label>Precio L. (0 = sin precio aún)</label>
          <input type="number" value={precio} onChange={e=>setPrecio(e.target.value)} placeholder="0"/>
        </div>
        <button className="btn btn-gold" style={{width:"100%"}} onClick={applyGlobal}>
          ⚡ Aplicar a los {filas.filter(r=>r.activo).length} lotes seleccionados
        </button>
        {applied && <div style={{color:"var(--green)",fontSize:".78rem",marginTop:6,textAlign:"center"}}>✅ Datos aplicados — revisa abajo y confirma</div>}
      </div>

      {/* Lista por manzana */}
      <div style={{fontSize:".72rem",color:"var(--muted)",marginBottom:8}}>
        {activos} lotes seleccionados de 75 · Toca ✓ para incluir/excluir
      </div>

      {manzanas.map(mz => {
        const mzFilas = filas.filter(r => r.manzana === mz);
        return (
          <div key={mz} style={{marginBottom:12}}>
            <div style={{fontFamily:"Playfair Display,serif",color:"var(--gold)",fontSize:".92rem",fontWeight:700,marginBottom:6}}>
              Manzana {mz} <span style={{color:"var(--muted)",fontSize:".72rem",fontWeight:400}}>({mzFilas.length} lotes)</span>
            </div>
            {mzFilas.map(fila => (
              <div key={fila._id} style={{
                display:"grid", gridTemplateColumns:"30px 40px 1fr 1fr",
                gap:6, alignItems:"center", padding:"5px 0",
                borderBottom:"1px solid var(--border)",
                opacity: fila.activo ? 1 : 0.4
              }}>
                <button onClick={()=>toggleFila(fila._id)} style={{
                  background: fila.activo ? "var(--green)" : "var(--surface)",
                  border:"1px solid var(--border)", borderRadius:6,
                  color: fila.activo ? "#0f1a0f" : "var(--muted)",
                  width:26,height:26,cursor:"pointer",fontSize:".75rem",fontWeight:700
                }}>{fila.activo?"✓":"○"}</button>
                <span style={{fontSize:".78rem",color:"var(--muted)",fontWeight:700}}>#{fila.numero}</span>
                <input
                  type="number" value={fila.medida}
                  onChange={e=>updateFila(fila._id,"medida",e.target.value)}
                  style={{background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text)",borderRadius:6,padding:"4px 6px",fontSize:".78rem"}}
                  placeholder="Medida"
                />
                <input
                  type="number" value={fila.precio}
                  onChange={e=>updateFila(fila._id,"precio",e.target.value)}
                  style={{background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text)",borderRadius:6,padding:"4px 6px",fontSize:".78rem"}}
                  placeholder="Precio L."
                />
              </div>
            ))}
          </div>
        );
      })}

      <div style={{display:"flex",gap:10,marginTop:16,position:"sticky",bottom:0,background:"var(--card)",paddingTop:10}}>
        <button className="btn btn-gold" style={{flex:1}} onClick={handleImport}>
          ✅ Importar {activos} Lotes
        </button>
        <button className="btn btn-outline" onClick={onClose}>Cancelar</button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   DASHBOARD
══════════════════════════════════════════════════ */
function Dashboard({clientes,lotes,ventas,pagos,setTab}){
  const disponibles = lotes.filter(l=>l.estado==="disponible").length;
  const vendidos    = lotes.filter(l=>l.estado==="vendido").length;
  const mesActual   = today().slice(0,7);
  const ingresosMes = pagos.filter(p=>p.fecha?.startsWith(mesActual)).reduce((s,p)=>s+Number(p.monto),0);
  const totalRec    = pagos.reduce((s,p)=>s+Number(p.monto),0);

  const alertas=[];
  ventas.filter(v=>v.estado==="activa").forEach(v=>{
    const pv=pagos.filter(p=>p.ventaId===v.id);
    const cl=clientes.find(c=>c.id===v.clienteId);
    const lt=lotes.find(l=>l.id===v.loteId);
    generarCuotas(v).forEach(c=>{
      const paid=pv.some(p=>p.tipo==="cuota"&&Number(p.numCuota)===c.num);
      if(paid) return;
      const diff=daysDiff(c.fecha);
      if(diff<0)       alertas.push({tipo:"vencida",cuota:c,cl,lt,diff});
      else if(diff<=7) alertas.push({tipo:"proxima",cuota:c,cl,lt,diff});
    });
  });

  return(
    <div>
      <div className="stats-grid">
        <div className="stat-card"><div className="stat-val">{lotes.length}</div><div className="stat-lbl">Total Lotes</div></div>
        <div className="stat-card"><div className="stat-val" style={{color:"var(--green)"}}>{disponibles}</div><div className="stat-lbl">Disponibles</div></div>
        <div className="stat-card"><div className="stat-val" style={{color:"var(--gold)"}}>{vendidos}</div><div className="stat-lbl">Vendidos</div></div>
        <div className="stat-card"><div className="stat-val" style={{color:"var(--blue)"}}>{clientes.length}</div><div className="stat-lbl">Clientes</div></div>
      </div>

      <div className="card" style={{borderColor:"var(--gold)",marginBottom:14}}>
        <div style={{fontSize:".7rem",color:"var(--muted)",textTransform:"uppercase",letterSpacing:".5px",marginBottom:4}}>Ingresos este mes</div>
        <div style={{fontFamily:"Playfair Display,serif",fontSize:"1.65rem",color:"var(--gold)",fontWeight:700}}>{fmtL(ingresosMes)}</div>
        <div style={{fontSize:".78rem",color:"var(--muted)",marginTop:4}}>Total histórico cobrado: {fmtL(totalRec)}</div>
      </div>

      {alertas.length>0&&(
        <>
          <div className="section-title">⚡ Alertas de Pago ({alertas.length})</div>
          {alertas.slice(0,5).map((a,i)=>(
            <div key={i} className={`alert ${a.tipo==="vencida"?"alert-danger":"alert-warn"}`}>
              <Svg path={IC.warn} size={17}/>
              <div>
                <div style={{fontWeight:700}}>{a.tipo==="vencida"?`Cuota #${a.cuota.num} VENCIDA`:`Cuota #${a.cuota.num} — ${a.diff} día(s)`}</div>
                <div style={{fontSize:".79rem",opacity:.9}}>{a.cl?.nombre||"?"} · Lote {a.lt?.numero||"?"} · {fmtL(a.cuota.monto)} · {fmtDate(a.cuota.fecha)}</div>
              </div>
            </div>
          ))}
          {alertas.length>5&&<div style={{fontSize:".8rem",color:"var(--muted)",textAlign:"center",marginBottom:12}}>y {alertas.length-5} más...</div>}
        </>
      )}

      <div className="section-title">Acceso Rápido</div>

const DEPTOS=["El Paraíso","Francisco Morazán","Choluteca","Valle","Olancho","Comayagua","Copán","Cortés","Santa Bárbara","Atlántida","Yoro","Colón","Intibucá","La Paz","Lempira","Ocotepeque","Gracias a Dios","Islas de la Bahía"];

function Clientes({clientes,saveClientes,ventas,saveVentas,lotes,saveLotes,pagos,savePagos}){
  const [modal,  setModal]  = useState(null);
  const [search, setSearch] = useState("");
  const [form,   setForm]   = useState({});
  const [detail, setDetail] = useState(null);

  const blank={nombre:"",dni:"",telefono:"",telefono2:"",email:"",municipio:"Danlí",departamento:"El Paraíso",direccion:"",referencia:""};

  const openNew  = ()=>{setForm({...blank});setModal("new");};
  const openEdit = c=>{setForm({...c});setModal("edit");};

  const handleSave = ()=>{
    if(!form.nombre?.trim()) return alert("El nombre es obligatorio");
    modal==="new"
      ? saveClientes([...clientes,{...form,id:uid(),createdAt:today()}])
      : saveClientes(clientes.map(c=>c.id===form.id?{...form}:c));
    setModal(null);
  };

  /* FIX: cascade delete — borra ventas y pagos del cliente */
  const handleDelete = id=>{
    const ventasCliente = ventas.filter(v=>v.clienteId===id);
    const msg = ventasCliente.length>0
      ? `Este cliente tiene ${ventasCliente.length} contrato(s). ¿Eliminar cliente Y todos sus contratos/pagos?`
      : "¿Eliminar este cliente?";
    if(!confirm(msg)) return;
    const ventaIds = new Set(ventasCliente.map(v=>v.id));
    savePagos(pagos.filter(p=>!ventaIds.has(p.ventaId)));
    // liberar lotes
    saveLotes(lotes.map(l=>ventasCliente.some(v=>v.loteId===l.id)?{...l,estado:"disponible"}:l));
    saveVentas(ventas.filter(v=>v.clienteId!==id));
    saveClientes(clientes.filter(c=>c.id!==id));
    setDetail(null);
  };

  const filtered=clientes.filter(c=>
    c.nombre?.toLowerCase().includes(search.toLowerCase())||
    c.dni?.includes(search)||c.telefono?.includes(search)
  );

  if(detail){
    const c=detail;
    const misVentas=ventas.filter(v=>v.clienteId===c.id);
    return(
      <div className="fade-in">
        <button className="btn btn-outline btn-sm" onClick={()=>setDetail(null)}>← Volver</button>

            <div className="detail-row"><span className="dk">Teléfono 2</span><span className="dv">{c.telefono2||"—"}</span></div>
            <div className="detail-row"><span className="dk">Email</span><span className="dv">{c.email||"—"}</span></div>
            <div className="detail-row"><span className="dk">Municipio</span><span className="dv">{c.municipio||"—"}</span></div>
            <div className="detail-row"><span className="dk">Departamento</span><span className="dv">{c.departamento||"—"}</span></div>
            <div className="detail-row"><span className="dk">Dirección</span><span className="dv" style={{maxWidth:"58%",textAlign:"right"}}>{c.direccion||"—"}</span></div>
            <div className="detail-row"><span className="dk">Referencia</span><span className="dv" style={{maxWidth:"58%",textAlign:"right"}}>{c.referencia||"—"}</span></div>
            <div className="detail-row"><span className="dk">Registro</span><span className="dv">{fmtDate(c.createdAt)}</span></div>
          </div>
          <div className="section-title" style={{marginTop:10}}>Contratos ({misVentas.length})</div>
          {misVentas.map(v=>{
            const l=lotes.find(lt=>lt.id===v.loteId);
            return(
              <div key={v.id} className="card">
                <div style={{fontWeight:700,color:"var(--gold)"}}>Lote {l?.numero||"—"}{l?.manzana?` · M.${l.manzana}`:""}</div>
                <div style={{fontSize:".79rem",color:"var(--muted)",marginTop:4}}>{l?.proyecto||""} · {fmtL(v.precio)} · {v.numCuotas} cuotas de {fmtL(v.montoCuota)}</div>
              </div>
            );

          <div style={{display:"flex",gap:10,marginTop:14,flexWrap:"wrap"}}>

          </div>
        </div>

  }

  return(
    <div>
      <div className="section-title">Clientes <span style={{color:"var(--muted)",fontSize:".78rem"}}>{clientes.length}</span></div>
      <input className="search-box" placeholder="🔍  Nombre, DNI o teléfono..." value={search} onChange={e=>setSearch(e.target.value)}/>
      {filtered.length===0&&<div className="empty-state"><div className="icon">👤</div><p>No hay clientes registrados</p></div>}
      {filtered.map(c=>(

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>

              <p>DNI: {c.dni||"—"} · {c.telefono||"Sin tel."}</p>
              <p style={{marginTop:2}}>{c.municipio||""}{c.municipio&&c.departamento?", ":""}{c.departamento||""}</p>
            </div>
            <span className={`badge badge-${ventas.some(v=>v.clienteId===c.id)?"gold":"blue"}`}>

          </div>

      <button className="fab no-print" onClick={openNew}>+</button>

            <div className="form-row">
              <div className="form-group"><label>DNI / RTN</label><input value={form.dni||""} onChange={e=>setForm({...form,dni:e.target.value})} placeholder="0501-XXXX-XXXXX"/></div>
              <div className="form-group"><label>Teléfono</label><input value={form.telefono||""} onChange={e=>setForm({...form,telefono:e.target.value})} placeholder="9XXX-XXXX"/></div>
            </div>
            <div className="form-row">
              <div className="form-group"><label>Teléfono 2</label><input value={form.telefono2||""} onChange={e=>setForm({...form,telefono2:e.target.value})}/></div>
              <div className="form-group"><label>Email</label><input type="email" value={form.email||""} onChange={e=>setForm({...form,email:e.target.value})}/></div>
            </div>
            <div className="form-row">
              <div className="form-group"><label>Municipio</label><input value={form.municipio||""} onChange={e=>setForm({...form,municipio:e.target.value})}/></div>
              <div className="form-group"><label>Departamento</label>

            <div className="form-group"><label>Referencia personal</label><input value={form.referencia||""} onChange={e=>setForm({...form,referencia:e.target.value})} placeholder="Nombre y tel. de referencia"/></div>

  );
}

/* ══════════════════════════════════════════════════

function Lotes({lotes,saveLotes,ventas,saveVentas,clientes,pagos,savePagos}){

  const [filter, setFilter] = useState("todos");
  const [form,   setForm]   = useState({});
  const [detail, setDetail] = useState(null);

  const blank={numero:"",manzana:"",proyecto:"",medida:"",unidad:"varas²",precio:"",estado:"disponible",colindancias:"",descripcion:""};
  const openNew  = ()=>{setForm({...blank});setModal("new");};
  const openEdit = l=>{setForm({...l});setModal("edit");};

  const handleSave = ()=>{
    if(!form.numero?.trim()) return alert("El número de lote es obligatorio");
    modal==="new"
      ? saveLotes([...lotes,{...form,id:uid(),createdAt:today()}])
      : saveLotes(lotes.map(l=>l.id===form.id?{...form}:l));
    setModal(null);
  };

  /* FIX: cascade delete lote → venta → pagos */
  const handleDelete = id=>{
    const ventaLote=ventas.find(v=>v.loteId===id);
    const msg=ventaLote?"Este lote tiene un contrato activo. ¿Eliminar lote, contrato y pagos asociados?":"¿Eliminar este lote?";
    if(!confirm(msg)) return;
    if(ventaLote){
      savePagos(pagos.filter(p=>p.ventaId!==ventaLote.id));
      saveVentas(ventas.filter(v=>v.id!==ventaLote.id));
    }
    saveLotes(lotes.filter(l=>l.id!==id));
    setDetail(null);
  };

  const badgeClass=e=>e==="disponible"?"badge-green":e==="vendido"?"badge-gold":e==="reservado"?"badge-orange":"badge-blue";
  const filtered=lotes.filter(l=>filter==="todos"||l.estado===filter);

  if(detail){
    const l=detail;
    const v=ventas.find(vn=>vn.loteId===l.id);
    const cl=v?clientes.find(c=>c.id===v.clienteId):null;
    return(
      <div className="fade-in">
        <button className="btn btn-outline btn-sm" onClick={()=>setDetail(null)}>← Volver</button>
        <div style={{marginTop:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>

            <span className={`badge ${badgeClass(l.estado)}`}>{l.estado?.toUpperCase()}</span>
          </div>
          <div className="card">
            <div className="detail-row"><span className="dk">Proyecto</span><span className="dv">{l.proyecto||"—"}</span></div>
            <div className="detail-row"><span className="dk">Medida</span><span className="dv">{l.medida} {l.unidad}</span></div>
            <div className="detail-row"><span className="dk">Precio</span><span className="dv" style={{color:"var(--gold)"}}>{fmtL(l.precio)}</span></div>
            <div className="detail-row"><span className="dk">Colindancias</span><span className="dv" style={{maxWidth:"55%",textAlign:"right"}}>{l.colindancias||"—"}</span></div>
            <div className="detail-row"><span className="dk">Descripción</span><span className="dv" style={{maxWidth:"55%",textAlign:"right"}}>{l.descripcion||"—"}</span></div>
          </div>
          {v&&cl&&(
            <div className="card" style={{borderColor:"var(--gold)"}}>
              <div style={{fontWeight:700,color:"var(--gold)",marginBottom:8}}>Propietario</div>
              <div className="detail-row"><span className="dk">Cliente</span><span className="dv">{cl.nombre}</span></div>
              <div className="detail-row"><span className="dk">Precio venta</span><span className="dv">{fmtL(v.precio)}</span></div>
              <div className="detail-row"><span className="dk">Prima</span><span className="dv">{fmtL(v.prima)}</span></div>
              <div className="detail-row"><span className="dk">Cuotas</span><span className="dv">{v.numCuotas} × {fmtL(v.montoCuota)}</span></div>
            </div>
          )}
          <div style={{display:"flex",gap:10,marginTop:14}}>
            <button className="btn btn-gold" onClick={()=>{openEdit(l);setDetail(null);}}>Editar</button>
            <button className="btn btn-danger" onClick={()=>handleDelete(l.id)}>Eliminar</button>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div>
      <div className="section-title">
        <span>Lotes <span style={{color:"var(--muted)",fontSize:".78rem"}}>{lotes.length}</span></span>
        <button className="btn btn-outline btn-sm" onClick={()=>setModal("importSL3")} style={{fontSize:".72rem",padding:"5px 10px"}}>
          📋 San Lorenzo 3
        </button>
      </div>
      <div className="tabs">
        {[["todos","Todos"],["disponible","Disponible"],["reservado","Reservado"],["vendido","Vendido"]].map(([f,l])=>(
          <button key={f} className={`tab${filter===f?" active":""}`} onClick={()=>setFilter(f)}>
            {l}{f!=="todos"?` (${lotes.filter(lt=>lt.estado===f).length})`:""}
          </button>
        ))}
      </div>
      {filtered.length===0&&<div className="empty-state"><div className="icon">🗺️</div><p>No hay lotes en esta categoría</p></div>}
      {filtered.map(l=>(
        <div key={l.id} className="list-item" onClick={()=>setDetail(l)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <h3>Lote {l.numero}{l.manzana?` · M.${l.manzana}`:""}</h3>
              <p>{l.proyecto||"Sin proyecto"} · {l.medida} {l.unidad}</p>
              <p style={{color:"var(--gold)",fontWeight:700,marginTop:5}}>{fmtL(l.precio)}</p>
            </div>
            <span className={`badge ${badgeClass(l.estado)}`}>{l.estado?.toUpperCase()}</span>
          </div>
        </div>
      ))}
      <button className="fab no-print" onClick={openNew}>+</button>

      {(modal==="new"||modal==="edit")&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal">
            <div className="modal-title">
              {modal==="new"?"Nuevo Lote":"Editar Lote"}
              <button className="btn-icon" onClick={()=>setModal(null)}><Svg path={IC.x} size={17}/></button>
            </div>
            <div className="form-row">
              <div className="form-group"><label>N° Lote *</label><input value={form.numero||""} onChange={e=>setForm({...form,numero:e.target.value})} placeholder="Ej: 12"/></div>
              <div className="form-group"><label>Manzana / Bloque</label><input value={form.manzana||""} onChange={e=>setForm({...form,manzana:e.target.value})} placeholder="Ej: A"/></div>
            </div>
            <div className="form-group"><label>Proyecto / Residencial</label><input value={form.proyecto||""} onChange={e=>setForm({...form,proyecto:e.target.value})} placeholder="Ej: Residencial Los Pinos"/></div>
            <div className="form-row">
              <div className="form-group"><label>Medida</label><input type="number" value={form.medida||""} onChange={e=>setForm({...form,medida:e.target.value})} placeholder="0.00"/></div>
              <div className="form-group"><label>Unidad</label>
                <select value={form.unidad||"varas²"} onChange={e=>setForm({...form,unidad:e.target.value})}>
                  <option>varas²</option><option>m²</option><option>manzanas</option><option>hectáreas</option>
                </select>
              </div>
            </div>
            <div className="form-row">
              <div className="form-group"><label>Precio (L.)</label><input type="number" value={form.precio||""} onChange={e=>setForm({...form,precio:e.target.value})}/></div>
              <div className="form-group"><label>Estado</label>
                <select value={form.estado||"disponible"} onChange={e=>setForm({...form,estado:e.target.value})}>
                  <option value="disponible">Disponible</option>
                  <option value="reservado">Reservado</option>
                  <option value="vendido">Vendido</option>
                </select>
              </div>
            </div>
            <div className="form-group"><label>Colindancias</label><textarea value={form.colindancias||""} onChange={e=>setForm({...form,colindancias:e.target.value})} placeholder="Norte: ..., Sur: ..., Este: ..., Oeste: ..."/></div>
            <div className="form-group"><label>Descripción / Notas</label><textarea value={form.descripcion||""} onChange={e=>setForm({...form,descripcion:e.target.value})}/></div>
            <div style={{display:"flex",gap:10}}>
              <button className="btn btn-gold" style={{flex:1}} onClick={handleSave}>Guardar</button>
              <button className="btn btn-outline" onClick={()=>setModal(null)}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════
   VENTAS / CONTRATOS — con EDICIÓN y búsqueda
══════════════════════════════════════════════════ */
function Ventas({ventas,saveVentas,clientes,lotes,saveLotes,pagos,savePagos}){
  const [modal,  setModal]  = useState(null); // null | "new" | "edit"
  const [form,   setForm]   = useState({});
  const [detail, setDetail] = useState(null);
  const [recibo, setRecibo] = useState(null);
  const [search, setSearch] = useState("");

  const blankForm = {clienteId:"",loteId:"",precio:"",prima:"",numCuotas:"12",interes:"0",fechaInicio:today(),notas:"",estado:"activa"};

  const cuotaEst = calcCuotaFn(form.precio,form.prima,form.numCuotas,form.interes);

  const handleSaveNew = ()=>{
    if(!form.clienteId) return alert("Seleccione un cliente");
    if(!form.loteId)    return alert("Seleccione un lote");
    if(!form.precio)    return alert("Ingrese el precio de venta");
    const mc = calcCuotaFn(form.precio,form.prima,form.numCuotas,form.interes);
    const nv = {...form,id:uid(),montoCuota:mc,createdAt:today()};
    saveVentas([...ventas,nv]);
    saveLotes(lotes.map(l=>l.id===form.loteId?{...l,estado:"vendido"}:l));
    if(Number(form.prima)>0){
      savePagos([...pagos,{id:uid(),ventaId:nv.id,tipo:"prima",numCuota:0,monto:form.prima,fecha:form.fechaInicio,nota:"Prima / Enganche inicial",createdAt:today()}]);
    }
    setModal(null);
    // ✅ Mostrar recibo automáticamente al completar la venta
    setTimeout(()=>setRecibo({ventaId:nv.id}),150);
  };

  /* FIX: editar contrato existente */
  const handleSaveEdit = ()=>{
    if(!form.precio) return alert("Ingrese el precio");
    const mc = calcCuotaFn(form.precio,form.prima,form.numCuotas,form.interes);
    saveVentas(ventas.map(v=>v.id===form.id?{...form,montoCuota:mc}:v));
    setModal(null);
    setDetail({...form,montoCuota:mc});
  };

  const handleDelete = id=>{
    if(!confirm("¿Eliminar contrato y todos sus pagos?")) return;
    const v=ventas.find(x=>x.id===id);
    if(v) saveLotes(lotes.map(l=>l.id===v.loteId?{...l,estado:"disponible"}:l));
    savePagos(pagos.filter(p=>p.ventaId!==id));
    saveVentas(ventas.filter(x=>x.id!==id));
    setDetail(null);
  };

  const filteredV = ventas.filter(v=>{
    const cl=clientes.find(c=>c.id===v.clienteId);
    const lt=lotes.find(l=>l.id===v.loteId);
    const q=search.toLowerCase();
    return !q||cl?.nombre?.toLowerCase().includes(q)||lt?.numero?.includes(q)||lt?.proyecto?.toLowerCase().includes(q);
  });

  if(recibo) return <Recibo recibo={recibo} clientes={clientes} lotes={lotes} ventas={ventas} pagos={pagos} onClose={()=>setRecibo(null)}/>;

  if(detail){
    const v=detail;
    const cl=clientes.find(c=>c.id===v.clienteId);
    const lt=lotes.find(l=>l.id===v.loteId);
    const pv=pagos.filter(p=>p.ventaId===v.id);
    const tp=pv.reduce((s,p)=>s+Number(p.monto),0);
    const sp=Number(v.precio)-tp;
    const pct=Math.min(100,(tp/Number(v.precio||1))*100);
    const cuotas=generarCuotas(v);
    return(
      <div className="fade-in">

          <div className="section-title">Contrato · Lote {lt?.numero}</div>

            <div className="detail-row"><span className="dk">Cliente</span><span className="dv">{cl?.nombre||"—"}</span></div>
            <div className="detail-row"><span className="dk">DNI / RTN</span><span className="dv">{cl?.dni||"—"}</span></div>
            <div className="detail-row"><span className="dk">Teléfono</span><span className="dv">{cl?.telefono||"—"}</span></div>
            <div className="detail-row"><span className="dk">Lote</span><span className="dv">Lote {lt?.numero}{lt?.manzana?` · M.${lt.manzana}`:""}</span></div>
            <div className="detail-row"><span className="dk">Proyecto</span><span className="dv">{lt?.proyecto||"—"}</span></div>
            <div className="detail-row"><span className="dk">Medida</span><span className="dv">{lt?.medida} {lt?.unidad}</span></div>
            <div className="detail-row"><span className="dk">Precio total</span><span className="dv" style={{color:"var(--gold)"}}>{fmtL(v.precio)}</span></div>
            <div className="detail-row"><span className="dk">Prima</span><span className="dv">{fmtL(v.prima)}</span></div>
            <div className="detail-row"><span className="dk">Cuotas</span><span className="dv">{v.numCuotas} × {fmtL(v.montoCuota)}</span></div>
            <div className="detail-row"><span className="dk">Interés anual</span><span className="dv">{v.interes||0}%</span></div>
            <div className="detail-row"><span className="dk">Fecha inicio</span><span className="dv">{fmtDate(v.fechaInicio)}</span></div>
            {v.notas&&<div className="detail-row"><span className="dk">Notas</span><span className="dv" style={{maxWidth:"60%",textAlign:"right"}}>{v.notas}</span></div>}
          </div>

          <div className="card" style={{borderColor:"var(--gold)"}}>
            <div style={{fontWeight:700,color:"var(--gold)",marginBottom:8}}>Estado del contrato</div>
            <div className="progress-wrap"><div className="progress-fill" style={{width:`${pct}%`}}/></div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:".78rem",marginTop:5}}>
              <span style={{color:"var(--green)"}}>Pagado: {fmtL(tp)}</span>
              <span style={{color:"var(--muted)"}}>{pct.toFixed(1)}%</span>
            </div>
            <div className="detail-row" style={{marginTop:8}}><span className="dk">Saldo pendiente</span><span className="dv" style={{color:sp>0?"var(--red)":"var(--green)"}}>{fmtL(Math.max(0,sp))}</span></div>
            <div className="detail-row"><span className="dk">Cuotas pagadas</span><span className="dv">{pv.filter(p=>p.tipo==="cuota").length} / {v.numCuotas}</span></div>
          </div>

          <div className="section-title" style={{marginTop:4}}>Plan de Pagos</div>
          {cuotas.map(c=>{
            const isPaid=pv.some(p=>p.tipo==="cuota"&&Number(p.numCuota)===c.num);
            const diff=daysDiff(c.fecha);
            return(
              <div key={c.num} className="cuota-row">
                <span className="cuota-num">#{c.num}</span>
                <div style={{flex:1,marginLeft:10}}>
                  <div style={{fontSize:".85rem",fontWeight:700}}>{fmtL(c.monto)}</div>
                  <div style={{fontSize:".74rem",color:"var(--muted)"}}>{fmtDate(c.fecha)}</div>
                </div>
                {isPaid?<span className="badge badge-green">Pagado</span>
                  :diff<0?<span className="badge badge-red">Vencida</span>
                  :diff<=7?<span className="badge badge-orange">Próxima</span>
                  :<span className="badge badge-muted">Pendiente</span>}
              </div>
            );
          })}

          <div style={{display:"flex",gap:10,marginTop:16,flexWrap:"wrap"}}>
            <button className="btn btn-gold" onClick={()=>setRecibo({ventaId:v.id})}>🖨 Recibo</button>
            <button className="btn btn-outline" onClick={()=>{setForm({...v});setModal("edit");}}>
              <Svg path={IC.edit} size={16}/> Editar
            </button>
            <button className="btn btn-danger btn-sm" onClick={()=>handleDelete(v.id)}>Eliminar</button>
          </div>
        </div>

        {/* Modal editar contrato */}
        {modal==="edit"&&(
          <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
            <div className="modal">
              <div className="modal-title">Editar Contrato <button className="btn-icon" onClick={()=>setModal(null)}><Svg path={IC.x} size={17}/></button></div>
              <div className="form-row">
                <div className="form-group"><label>Precio venta (L.)</label><input type="number" value={form.precio||""} onChange={e=>setForm({...form,precio:e.target.value})}/></div>
                <div className="form-group"><label>Prima</label><input type="number" value={form.prima||""} onChange={e=>setForm({...form,prima:e.target.value})}/></div>
              </div>
              <div className="form-row">
                <div className="form-group"><label>N° Cuotas</label><input type="number" value={form.numCuotas||""} onChange={e=>setForm({...form,numCuotas:e.target.value})}/></div>
                <div className="form-group"><label>Interés %</label><input type="number" value={form.interes||""} onChange={e=>setForm({...form,interes:e.target.value})}/></div>
              </div>
              <div className="card" style={{borderColor:"var(--gold)",padding:12,marginBottom:12}}>
                <div style={{fontSize:".7rem",color:"var(--muted)"}}>Nueva cuota estimada</div>
                <div style={{fontFamily:"Playfair Display,serif",fontSize:"1.4rem",color:"var(--gold)",fontWeight:700}}>{fmtL(calcCuotaFn(form.precio,form.prima,form.numCuotas,form.interes))}</div>
              </div>
              <div className="form-group"><label>Estado contrato</label>
                <select value={form.estado||"activa"} onChange={e=>setForm({...form,estado:e.target.value})}>
                  <option value="activa">Activa</option>
                  <option value="cancelada">Cancelada</option>
                  <option value="mora">En mora</option>
                </select>
              </div>
              <div className="form-group"><label>Notas</label><textarea value={form.notas||""} onChange={e=>setForm({...form,notas:e.target.value})}/></div>
              <div style={{display:"flex",gap:10}}>
                <button className="btn btn-gold" style={{flex:1}} onClick={handleSaveEdit}>Guardar cambios</button>
                <button className="btn btn-outline" onClick={()=>setModal(null)}>Cancelar</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  return(
    <div>
      <div className="section-title">Contratos <span style={{color:"var(--muted)",fontSize:".78rem"}}>{ventas.length}</span></div>
      <input className="search-box" placeholder="🔍  Buscar cliente o lote..." value={search} onChange={e=>setSearch(e.target.value)}/>
      {filteredV.length===0&&<div className="empty-state"><div className="icon">📋</div><p>No hay contratos registrados</p></div>}
      {filteredV.map(v=>{
        const cl=clientes.find(c=>c.id===v.clienteId);
        const lt=lotes.find(l=>l.id===v.loteId);
        const pv=pagos.filter(p=>p.ventaId===v.id);
        const tp=pv.reduce((s,p)=>s+Number(p.monto),0);
        const pct=Math.min(100,(tp/Number(v.precio||1))*100);
        const cuotas=generarCuotas(v);
        const nextDue=cuotas.find(c=>!pv.some(p=>p.tipo==="cuota"&&Number(p.numCuota)===c.num));
        return(
          <div key={v.id} className="list-item" onClick={()=>setDetail(v)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <h3>{cl?.nombre||"Cliente no encontrado"}</h3>
                <p>Lote {lt?.numero||"—"}{lt?.manzana?` · M.${lt.manzana}`:""} · {lt?.proyecto||""}</p>
                <p style={{color:"var(--gold)",fontWeight:700,marginTop:4}}>{fmtL(v.precio)} · {v.numCuotas} cuotas</p>
                <div className="progress-wrap" style={{marginTop:8}}><div className="progress-fill" style={{width:`${pct}%`}}/></div>
                <div style={{fontSize:".74rem",color:"var(--muted)",marginTop:3}}>
                  {pct.toFixed(0)}% pagado · {fmtL(tp)}{nextDue?` · Próx: ${fmtDate(nextDue.fecha)}`:""}
                </div>
              </div>
              <span className={`badge badge-${v.estado==="activa"?"green":v.estado==="mora"?"red":"gold"}`}>{v.estado?.toUpperCase()}</span>
            </div>
          </div>
        );
      })}
      <button className="fab no-print" onClick={()=>{setForm({...blankForm});setModal("new");}}>+</button>

      {modal==="new"&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal">
            <div className="modal-title">Nuevo Contrato <button className="btn-icon" onClick={()=>setModal(null)}><Svg path={IC.x} size={17}/></button></div>
            <div className="form-group"><label>Cliente *</label>
              <select value={form.clienteId||""} onChange={e=>setForm({...form,clienteId:e.target.value})}>
                <option value="">— Seleccionar cliente —</option>
                {clientes.map(c=><option key={c.id} value={c.id}>{c.nombre} · {c.dni||"Sin DNI"}</option>)}
              </select>
            </div>
            <div className="form-group"><label>Lote *</label>
              <select value={form.loteId||""} onChange={e=>{
                const l=lotes.find(x=>x.id===e.target.value);
                setForm({...form,loteId:e.target.value,precio:l?.precio||form.precio});
              }}>
                <option value="">— Seleccionar lote —</option>
                {lotes.filter(l=>l.estado!=="vendido").map(l=>(
                  <option key={l.id} value={l.id}>Lote {l.numero}{l.manzana?` M.${l.manzana}`:""} · {l.proyecto} · {fmtL(l.precio)}</option>
                ))}
              </select>
            </div>
            <div className="form-row">
              <div className="form-group"><label>Precio venta (L.) *</label><input type="number" value={form.precio||""} onChange={e=>setForm({...form,precio:e.target.value})}/></div>
              <div className="form-group"><label>Prima / Enganche</label><input type="number" value={form.prima||""} onChange={e=>setForm({...form,prima:e.target.value})} placeholder="0"/></div>
            </div>
            <div className="form-row">
              <div className="form-group"><label>N° Cuotas</label><input type="number" value={form.numCuotas||""} onChange={e=>setForm({...form,numCuotas:e.target.value})}/></div>
              <div className="form-group"><label>Interés anual %</label><input type="number" value={form.interes||""} onChange={e=>setForm({...form,interes:e.target.value})} placeholder="0"/></div>
            </div>
            {form.precio&&(
              <div className="card" style={{borderColor:"var(--gold)",marginBottom:12,padding:12}}>
                <div style={{fontSize:".7rem",color:"var(--muted)"}}>Cuota mensual estimada</div>
                <div style={{fontFamily:"Playfair Display,serif",fontSize:"1.5rem",color:"var(--gold)",fontWeight:700}}>{fmtL(cuotaEst)}</div>
                <div style={{fontSize:".74rem",color:"var(--muted)",marginTop:3}}>Saldo a financiar: {fmtL(Number(form.precio||0)-Number(form.prima||0))}</div>
              </div>
            )}
            <div className="form-group"><label>Fecha de firma</label><input type="date" value={form.fechaInicio||today()} onChange={e=>setForm({...form,fechaInicio:e.target.value})}/></div>
            <div className="form-group"><label>Notas del contrato</label><textarea value={form.notas||""} onChange={e=>setForm({...form,notas:e.target.value})}/></div>
            <div style={{display:"flex",gap:10}}>
              <button className="btn btn-gold" style={{flex:1}} onClick={handleSaveNew}>Crear Contrato</button>
              <button className="btn btn-outline" onClick={()=>setModal(null)}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════
   PAGOS
══════════════════════════════════════════════════ */
function PagosView({pagos,savePagos,ventas,clientes,lotes}){
  const [modal, setModal] = useState(false);
  const [form,  setForm]  = useState({ventaId:"",tipo:"cuota",numCuota:"",monto:"",fecha:today(),nota:""});
  const [filter,setFilter]= useState("todos");
  const [recibo,setRecibo]= useState(null);

  const cuotasPendientes = ventaId=>{
    const v=ventas.find(x=>x.id===ventaId);
    if(!v) return [];
    return generarCuotas(v).filter(c=>!pagos.some(p=>p.ventaId===ventaId&&p.tipo==="cuota"&&Number(p.numCuota)===c.num));
  };

  const handleSave = ()=>{
    if(!form.ventaId) return alert("Seleccione un contrato");
    if(!form.monto)   return alert("Ingrese el monto");
    savePagos([...pagos,{...form,id:uid(),createdAt:today()}]);
    setModal(false);
    setForm({ventaId:"",tipo:"cuota",numCuota:"",monto:"",fecha:today(),nota:""});
  };

  const handleDelete = id=>{
    if(!confirm("¿Eliminar este pago? El saldo del contrato se actualizará.")) return;
    savePagos(pagos.filter(p=>p.id!==id));
  };

  const mesActual=today().slice(0,7);
  const filtered=filter==="mes"?pagos.filter(p=>p.fecha?.startsWith(mesActual)):filter==="cuota"?pagos.filter(p=>p.tipo==="cuota"):pagos;
  const totalFiltrado=filtered.reduce((s,p)=>s+Number(p.monto),0);

  if(recibo) return <Recibo recibo={recibo} clientes={clientes} lotes={lotes} ventas={ventas} pagos={pagos} onClose={()=>setRecibo(null)}/>;

  return(
    <div>
      <div className="section-title">Registro de Pagos <span style={{color:"var(--muted)",fontSize:".78rem"}}>{pagos.length}</span></div>
      <div className="tabs">
        {[["todos","Todos"],["mes","Este mes"],["cuota","Cuotas"]].map(([f,l])=>(
          <button key={f} className={`tab${filter===f?" active":""}`} onClick={()=>setFilter(f)}>{l}</button>
        ))}
      </div>
      {filtered.length>0&&(
        <div className="card" style={{borderColor:"var(--green)",padding:"10px 14px",marginBottom:12}}>
          <div style={{fontSize:".7rem",color:"var(--muted)"}}>Total en vista</div>
          <div style={{fontFamily:"Playfair Display,serif",fontSize:"1.3rem",color:"var(--green)",fontWeight:700}}>{fmtL(totalFiltrado)}</div>
        </div>
      )}
      {filtered.length===0&&<div className="empty-state"><div className="icon">💵</div><p>No hay pagos en esta categoría</p></div>}
      {[...filtered].reverse().map(p=>{
        const v=ventas.find(x=>x.id===p.ventaId);
        const cl=v?clientes.find(c=>c.id===v.clienteId):null;
        const lt=v?lotes.find(l=>l.id===v.loteId):null;
        return(
          <div key={p.id} className="list-item" style={{cursor:"default"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <h3 style={{color:"var(--green)"}}>{fmtL(p.monto)}</h3>
                <p>{cl?.nombre||"—"} · Lote {lt?.numero||"—"}</p>
                <p style={{marginTop:2}}>{fmtDate(p.fecha)} · {p.tipo==="prima"?"Prima":p.tipo==="cuota"?`Cuota #${p.numCuota||"?"}`:p.tipo}</p>
                {p.nota&&<p style={{color:"var(--muted)",marginTop:2}}>{p.nota}</p>}
              </div>
              <div style={{display:"flex",gap:6,flexShrink:0}}>
                <button className="btn-icon" title="Imprimir recibo" onClick={()=>setRecibo({pagoId:p.id})}><Svg path={IC.print} size={17}/></button>
                <button className="btn-icon" style={{color:"var(--red)",borderColor:"rgba(224,82,82,.3)"}} title="Eliminar pago" onClick={()=>handleDelete(p.id)}>
                  <Svg path={IC.trash} size={17}/>
                </button>
              </div>
            </div>
          </div>
        );
      })}
      <button className="fab no-print" onClick={()=>setModal(true)}>+</button>

      {modal&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(false)}>
          <div className="modal">
            <div className="modal-title">Registrar Pago <button className="btn-icon" onClick={()=>setModal(false)}><Svg path={IC.x} size={17}/></button></div>
            <div className="form-group"><label>Contrato / Cliente *</label>
              <select value={form.ventaId} onChange={e=>setForm({...form,ventaId:e.target.value,numCuota:""})}>
                <option value="">— Seleccionar —</option>
                {ventas.map(v=>{
                  const c=clientes.find(x=>x.id===v.clienteId);
                  const l=lotes.find(x=>x.id===v.loteId);
                  return <option key={v.id} value={v.id}>{c?.nombre||"?"} · Lote {l?.numero||"?"}</option>;
                })}
              </select>
            </div>
            <div className="form-row">
              <div className="form-group"><label>Tipo de pago</label>
                <select value={form.tipo} onChange={e=>setForm({...form,tipo:e.target.value,numCuota:""})}>
                  <option value="cuota">Cuota mensual</option>
                  <option value="prima">Prima / Enganche</option>
                  <option value="adelanto">Adelanto</option>
                  <option value="multa">Mora / Recargo</option>
                </select>
              </div>
              {/* FIX: solo mostrar selector cuota cuando tipo=cuota */}
              {form.tipo==="cuota"&&form.ventaId&&(
                <div className="form-group"><label>N° Cuota</label>
                  <select value={form.numCuota} onChange={e=>{
                    const cp=cuotasPendientes(form.ventaId).find(c=>c.num===Number(e.target.value));
                    setForm({...form,numCuota:e.target.value,monto:cp?String(cp.monto):form.monto});
                  }}>
                    <option value="">—</option>
                    {cuotasPendientes(form.ventaId).map(c=>(
                      <option key={c.num} value={c.num}>#{c.num} · {fmtDate(c.fecha)} · {fmtL(c.monto)}</option>
                    ))}
                  </select>
                </div>
              )}
            </div>
            <div className="form-row">
              <div className="form-group"><label>Monto (L.) *</label><input type="number" value={form.monto} onChange={e=>setForm({...form,monto:e.target.value})}/></div>
              <div className="form-group"><label>Fecha pago</label><input type="date" value={form.fecha} onChange={e=>setForm({...form,fecha:e.target.value})}/></div>
            </div>
            <div className="form-group"><label>Nota / Referencia</label><input value={form.nota} onChange={e=>setForm({...form,nota:e.target.value})} placeholder="Ej: Transferencia BAC #12345"/></div>
            <div style={{display:"flex",gap:10}}>
              <button className="btn btn-gold" style={{flex:1}} onClick={handleSave}>Guardar Pago</button>
              <button className="btn btn-outline" onClick={()=>setModal(false)}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════
   RECIBO / COMPROBANTE
══════════════════════════════════════════════════ */
function Recibo({recibo,onClose,clientes,lotes,ventas,pagos}){
  const pago  = recibo.pagoId?pagos.find(p=>p.id===recibo.pagoId):null;
  const venta = pago?ventas.find(v=>v.id===pago.ventaId):ventas.find(v=>v.id===recibo.ventaId);
  if(!venta) return(
    <div><button className="btn btn-outline btn-sm" onClick={onClose}>← Volver</button>
    <div style={{marginTop:20,color:"var(--muted)"}}>Contrato no encontrado.</div></div>
  );
  const cl  = clientes.find(c=>c.id===venta.clienteId);
  const lt  = lotes.find(l=>l.id===venta.loteId);
  const pv  = pagos.filter(p=>p.ventaId===venta.id);
  const tp  = pv.reduce((s,p)=>s+Number(p.monto),0);
  const sp  = Number(venta.precio)-tp;
  const reciboNum = `REC-${(recibo.pagoId||venta.id).slice(-6).toUpperCase()}`;

  return(
    <div className="fade-in">
      <div className="no-print" style={{marginBottom:16,display:"flex",gap:10}}>
        <button className="btn btn-outline btn-sm" onClick={onClose}>← Volver</button>

      {/* Marca de agua - centro */}

        position:"absolute",top:"50%",left:"50%",
        transform:"translate(-50%,-50%)",
        width:"55%",opacity:0.05,pointerEvents:"none",zIndex:0
      }}/>
      {/* Sello esquina sup-izq */}
      <img src={LOGO_B64} alt="" aria-hidden="true" style={{
        position:"absolute",top:8,left:8,width:70,opacity:0.18,pointerEvents:"none",zIndex:1
      }}/>
      {/* Sello esquina sup-der */}
      <img src={LOGO_B64} alt="" aria-hidden="true" style={{
        position:"absolute",top:8,right:8,width:70,opacity:0.18,pointerEvents:"none",zIndex:1
      }}/>
      {/* Sello esquina inf-izq */}
      <img src={LOGO_B64} alt="" aria-hidden="true" style={{
        position:"absolute",bottom:8,left:8,width:70,opacity:0.18,pointerEvents:"none",zIndex:1
      }}/>
      {/* Sello esquina inf-der */}
      <img src={LOGO_B64} alt="" aria-hidden="true" style={{
        position:"absolute",bottom:8,right:8,width:70,opacity:0.18,pointerEvents:"none",zIndex:1
      }}/>
        <div style={{textAlign:"center",marginBottom:16}}>
          <div style={{marginBottom:8}}>
            <img src={LOGO_B64} alt="Villa Panamericana" style={{height:50,objectFit:"contain",background:"white",borderRadius:10,padding:"4px 10px"}}/>
          </div>
          <div style={{fontFamily:"Playfair Display,serif",fontSize:"1.3rem",color:"var(--gold)",fontWeight:700}}>COMPROBANTE DE PAGO</div>
          <div style={{fontSize:".78rem",color:"var(--muted)",marginTop:4}}>N°: {reciboNum}</div>
          <div style={{fontSize:".78rem",color:"var(--muted)"}}>Fecha: {fmtDate(pago?.fecha||today())}</div>
        </div>
        <div className="divider"/>

        <div style={{marginBottom:14}}>
          <div style={{fontSize:".7rem",color:"var(--muted)",textTransform:"uppercase",letterSpacing:".5px",fontWeight:700,marginBottom:7}}>Datos del Cliente</div>
          <div className="detail-row"><span className="dk">Nombre</span><span className="dv">{cl?.nombre||"—"}</span></div>
          <div className="detail-row"><span className="dk">DNI / RTN</span><span className="dv">{cl?.dni||"—"}</span></div>
          <div className="detail-row"><span className="dk">Teléfono</span><span className="dv">{cl?.telefono||"—"}</span></div>
          <div className="detail-row"><span className="dk">Dirección</span><span className="dv" style={{maxWidth:"58%",textAlign:"right"}}>{cl?.direccion||"—"}</span></div>
        </div>

        <div style={{marginBottom:14}}>
          <div style={{fontSize:".7rem",color:"var(--muted)",textTransform:"uppercase",letterSpacing:".5px",fontWeight:700,marginBottom:7}}>Datos del Lote</div>
          <div className="detail-row"><span className="dk">Proyecto</span><span className="dv">{lt?.proyecto||"—"}</span></div>
          <div className="detail-row"><span className="dk">Lote / Manzana</span><span className="dv">Lote {lt?.numero}{lt?.manzana?` · M.${lt.manzana}`:""}</span></div>
          <div className="detail-row"><span className="dk">Medida</span><span className="dv">{lt?.medida} {lt?.unidad}</span></div>
          <div className="detail-row"><span className="dk">Precio pactado</span><span className="dv">{fmtL(venta.precio)}</span></div>
        </div>

        {pago&&(
          <div style={{background:"rgba(201,168,76,.08)",border:"1px solid var(--gold)",borderRadius:10,padding:14,marginBottom:14}}>
            <div style={{fontSize:".7rem",color:"var(--gold)",textTransform:"uppercase",letterSpacing:".5px",fontWeight:700,marginBottom:7}}>Pago Registrado</div>
            <div className="detail-row"><span className="dk">Tipo</span><span className="dv">{pago.tipo==="cuota"?`Cuota mensual #${pago.numCuota}`:pago.tipo==="prima"?"Prima / Enganche":pago.tipo}</span></div>
            <div className="detail-row"><span className="dk">Fecha</span><span className="dv">{fmtDate(pago.fecha)}</span></div>
            <div className="detail-row"><span className="dk">Referencia</span><span className="dv">{pago.nota||"—"}</span></div>
            <div style={{marginTop:12,textAlign:"center"}}>
              <div style={{fontSize:".72rem",color:"var(--muted)"}}>MONTO PAGADO</div>
              <div style={{fontFamily:"Playfair Display,serif",fontSize:"2rem",color:"var(--green)",fontWeight:700}}>{fmtL(pago.monto)}</div>
            </div>
          </div>
        )}

        <div className="detail-row"><span className="dk">Total abonado</span><span className="dv" style={{color:"var(--green)"}}>{fmtL(tp)}</span></div>
        <div className="detail-row"><span className="dk">Saldo pendiente</span><span className="dv" style={{color:sp>0?"var(--red)":"var(--green)"}}>{fmtL(Math.max(0,sp))}</span></div>
        {sp<=0&&<div style={{textAlign:"center",color:"var(--green)",fontWeight:700,marginTop:8,fontSize:".9rem"}}>✅ LOTE CANCELADO EN SU TOTALIDAD</div>}

        <div className="divider" style={{marginTop:16}}/>
        <div style={{textAlign:"center",fontSize:".75rem",color:"var(--muted)"}}>
          <div>Este recibo es comprobante válido del pago indicado.</div>
          <div style={{marginTop:24,display:"flex",justifyContent:"space-around"}}>
            <div><div style={{borderTop:"1px solid var(--muted)",width:130,margin:"0 auto",paddingTop:4}}>Firma del Cliente</div></div>
            <div><div style={{borderTop:"1px solid var(--muted)",width:130,margin:"0 auto",paddingTop:4}}>Firma Autorizada</div></div>
          </div>
          <div style={{marginTop:16,fontSize:".68rem"}}>SolaresHN · {new Date().toLocaleDateString("es-HN")}</div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

  </script>
</body>
</html>
