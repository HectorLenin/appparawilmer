<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SolaresHN - Corregido</title>

<style>
body { font-family: Arial; }

/* FIRMA */
.firma-container { margin-top: 60px; text-align: center; }
.linea-firma { border-top: 1px solid #000; width: 250px; margin: auto; position: relative; }
.img-firma { position: absolute; top: -40px; left: 50%; transform: translateX(-50%); height: 60px; }

/* RECIBO */
.recibo { margin-top: 80px; }

/* CAMPOS */
.fila { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 8px; }
.fila div { width: 48%; border-bottom: 1px solid #000; padding: 4px; }

/* PAGINACION */
@media print {
  .page { page-break-after: always; }
  .page-number:after { content: counter(page); }
}
.page-number { text-align: center; margin-top: 20px; }
</style>
</head>

<body>

<div class="page">
<h2>INFORMACIÓN PARA CONTRATO</h2>

<div class="fila">
  <div>Fecha:</div>
  <div>Vendedor:</div>
</div>

<div class="fila">
  <div>Cliente:</div>
  <div>DNI:</div>
</div>

<div class="fila">
  <div>Domicilio:</div>
  <div>Estado civil:</div>
</div>

<div class="fila">
  <div>Tel. Personal:</div>
  <div>Tel. Referencia:</div>
</div>

<div class="firma-container">
  <div class="linea-firma">
    <img src="firma.png" class="img-firma">
  </div>
</div>

<div class="page-number"></div>
</div>

<div class="page recibo">
<h2>RECIBO</h2>

<div class="firma-container">
  <div class="linea-firma">
    <img src="firma.png" class="img-firma">
  </div>
</div>

<div class="page-number"></div>
</div>

<button onclick="window.print()">Descargar / Imprimir</button>

</body>
</html>
