/* ══════════════════════════════════════════════════
   MODAL PAGO ADELANTADO
══════════════════════════════════════════════════ */
function ModalAdelanto({venta,cliente,lote,pagos,savePagos,allPagos,onClose,onRecibo}){
  const CUOTA = 2000;
  const cuotasPend = generarCuotas(venta).filter(c=>
    !pagos.some(p=>p.tipo==="cuota"&&Number(p.numCuota)===c.num)
  );
  const [modo, setModo] = React.useState("completo"); // "completo" | "libre"
  // — Modo completo (cuotas enteras) —
  const [seleccionadas, setSeleccionadas] = React.useState([]);
  // — Modo libre (monto a voluntad) —
  const [montoLibre, setMontoLibre] = React.useState("");
  const [fecha, setFecha] = React.useState(today());
  const [nota, setNota] = React.useState("");

  // Calcular saldo acumulado ya existente (adelantos parciales previos)
  const adelantosPrevios = pagos.filter(p=>p.tipo==="adelanto_parcial");
  const acumPrevio = adelantosPrevios.reduce((s,p)=>s+Number(p.monto),0);

  // Saldo proyectado al agregar el monto libre
  const montoNum = Number(montoLibre)||0;
  const acumTotal = acumPrevio + montoNum;
  const cuotasCubiertas = Math.floor(acumTotal / CUOTA);
  const saldoRestante = acumTotal % CUOTA;

  const toggle = c => setSeleccionadas(prev=>
    prev.some(x=>x.num===c.num)?prev.filter(x=>x.num!==c.num):[...prev,c]
  );
  const total = seleccionadas.reduce((s,c)=>s+Number(c.monto),0);

  const handleGuardarCompleto = ()=>{
    if(seleccionadas.length===0) return alert("Selecciona al menos una cuota");
    const nuevos = seleccionadas.map(c=>({
      id:uid(), ventaId:venta.id, tipo:"cuota",
      numCuota:c.num, monto:c.monto, fecha, nota:nota||"Pago adelantado",
      createdAt:today()
    }));
    savePagos([...allPagos,...nuevos]);
    onRecibo(nuevos.map(p=>p.id));
  };

  const handleGuardarLibre = ()=>{
    if(montoNum<=0) return alert("Ingresa un monto mayor a 0");
    const nuevo = {
      id:uid(), ventaId:venta.id, tipo:"adelanto_parcial",
      numCuota:0, monto:montoNum, fecha,
      nota:nota||"Abono parcial",
      createdAt:today()
    };
    savePagos([...allPagos, nuevo]);
    onRecibo([nuevo.id]);
  };

  const tabStyle = (t) => ({
    flex:1, padding:"8px 0", borderRadius:8, border:"none", cursor:"pointer", fontWeight:700,
    fontSize:".82rem",
    background: modo===t ? "var(--green)" : "var(--card2)",
    color: modo===t ? "#0f1a0f" : "var(--muted)"
  });

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxHeight:"90vh",overflowY:"auto"}}>
        <div className="modal-title">💳 Pago Adelantado
          <button className="btn-icon" onClick={onClose}><Svg path={IC.x} size={17}/></button>
        </div>
        <div style={{fontSize:".8rem",color:"var(--muted)",marginBottom:12}}>
          Cliente: <b>{cliente?.nombre}</b> · Lote {lote?.numero}{lote?.manzana?` · Bloque ${lote.manzana}`:""}
        </div>

        {/* Tabs */}
        <div style={{display:"flex",gap:6,marginBottom:14}}>
          <button style={tabStyle("completo")} onClick={()=>setModo("completo")}>✅ Cuotas completas</button>
          <button style={tabStyle("libre")} onClick={()=>setModo("libre")}>💰 Monto libre</button>
        </div>

        {/* ── MODO CUOTAS COMPLETAS ── */}
        {modo==="completo"&&(<>
          <div style={{fontSize:".78rem",color:"var(--muted)",marginBottom:8}}>Selecciona las cuotas a pagar:</div>
          {cuotasPend.length===0&&<div style={{color:"var(--green)",padding:"10px 0"}}>✅ Todas las cuotas están pagadas</div>}
          {cuotasPend.map(c=>{
            const sel=seleccionadas.some(x=>x.num===c.num);
            return(
              <div key={c.num} onClick={()=>toggle(c)} style={{
                display:"flex",alignItems:"center",gap:10,padding:"8px 0",
                borderBottom:"1px solid var(--border)",cursor:"pointer"
              }}>
                <div style={{width:22,height:22,borderRadius:5,border:"2px solid",
                  borderColor:sel?"var(--green)":"var(--border)",
                  background:sel?"var(--green)":"transparent",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  color:"#0f1a0f",fontSize:".8rem",fontWeight:700,flexShrink:0
                }}>{sel?"✓":""}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:".84rem",fontWeight:700}}>Cuota #{c.num}</div>
                  <div style={{fontSize:".74rem",color:"var(--muted)"}}>{fmtDate(c.fecha)}</div>
                </div>
                <div style={{color:"var(--gold)",fontWeight:700}}>{fmtL(c.monto)}</div>
              </div>
            );
          })}
          {seleccionadas.length>0&&(
            <div className="card" style={{borderColor:"var(--gold)",padding:12,margin:"12px 0"}}>
              <div style={{fontSize:".7rem",color:"var(--muted)"}}>Total — {seleccionadas.length} cuota{seleccionadas.length>1?"s":""}</div>
              <div style={{fontFamily:"Playfair Display,serif",fontSize:"1.5rem",color:"var(--gold)",fontWeight:700}}>{fmtL(total)}</div>
            </div>
          )}
          <div className="form-row" style={{marginTop:10}}>
            <div className="form-group"><label>Fecha de pago</label>
              <input type="date" value={fecha} onChange={e=>setFecha(e.target.value)}/>
            </div>
            <div className="form-group"><label>Referencia / Nota</label>
              <input value={nota} onChange={e=>setNota(e.target.value)} placeholder="Transferencia, efectivo..."/>
            </div>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button className="btn btn-gold" style={{flex:1}} onClick={handleGuardarCompleto} disabled={seleccionadas.length===0}>
              ✅ Registrar y Ver Recibo
            </button>
            <button className="btn btn-outline" onClick={onClose}>Cancelar</button>
          </div>
        </>)}

        {/* ── MODO MONTO LIBRE ── */}
        {modo==="libre"&&(<>
          <div style={{fontSize:".78rem",color:"var(--muted)",marginBottom:10}}>
            El cliente paga lo que puede. Los abonos se acumulan hasta completar cuotas de L.2,000.
          </div>

          {/* Saldo previo acumulado */}
          {acumPrevio>0&&(
            <div className="card" style={{borderColor:"var(--green)",padding:10,marginBottom:12}}>
              <div style={{fontSize:".7rem",color:"var(--muted)"}}>Saldo acumulado previo</div>
              <div style={{fontFamily:"Playfair Display,serif",fontSize:"1.3rem",color:"var(--green)",fontWeight:700}}>{fmtL(acumPrevio)}</div>
              <div style={{fontSize:".72rem",color:"var(--muted)",marginTop:3}}>
                = {Math.floor(acumPrevio/CUOTA)} cuota{Math.floor(acumPrevio/CUOTA)!==1?"s":""} completa{Math.floor(acumPrevio/CUOTA)!==1?"s":""} + L.{(acumPrevio%CUOTA).toLocaleString("es-HN",{minimumFractionDigits:2})} restante
              </div>
            </div>
          )}

          <div className="form-group">
            <label>Monto del abono (L.)</label>
            <input type="number" min="1" value={montoLibre}
              onChange={e=>setMontoLibre(e.target.value)}
              placeholder="Ej: 1500"/>
          </div>

          {/* Proyección en tiempo real */}
          {montoNum>0&&(
            <div className="card" style={{borderColor:"var(--gold)",padding:12,margin:"8px 0"}}>
              <div style={{fontSize:".75rem",color:"var(--muted)",fontWeight:700,marginBottom:6}}>📊 Acumulado total tras este abono:</div>
              <div style={{fontFamily:"Playfair Display,serif",fontSize:"1.4rem",color:"var(--gold)",fontWeight:700}}>{fmtL(acumTotal)}</div>
              <div style={{marginTop:8,display:"flex",gap:8,flexWrap:"wrap"}}>
                <div style={{background:"var(--card2)",borderRadius:8,padding:"6px 12px",flex:1}}>
                  <div style={{fontSize:".68rem",color:"var(--muted)"}}>Cuotas completas</div>
                  <div style={{fontSize:"1.1rem",fontWeight:700,color:"var(--green)"}}>{cuotasCubiertas}</div>
                </div>
                <div style={{background:"var(--card2)",borderRadius:8,padding:"6px 12px",flex:1}}>
                  <div style={{fontSize:".68rem",color:"var(--muted)"}}>Saldo a favor</div>
                  <div style={{fontSize:"1.1rem",fontWeight:700,color:saldoRestante>0?"var(--gold)":"var(--muted)"}}>
                    {fmtL(saldoRestante)}
                  </div>
                </div>
              </div>
              {cuotasCubiertas>0&&(
                <div style={{fontSize:".72rem",color:"var(--green)",marginTop:6}}>
                  ✅ Con este abono se cubren {cuotasCubiertas} cuota{cuotasCubiertas>1?"s":""} completa{cuotasCubiertas>1?"s":""}
                  {saldoRestante>0?` y quedan L.${saldoRestante.toLocaleString("es-HN",{minimumFractionDigits:2})} acumulados para la siguiente`:""}
                </div>
              )}
            </div>
          )}

          <div className="form-row" style={{marginTop:10}}>
            <div className="form-group"><label>Fecha de pago</label>
              <input type="date" value={fecha} onChange={e=>setFecha(e.target.value)}/>
            </div>
            <div className="form-group"><label>Referencia / Nota</label>
              <input value={nota} onChange={e=>setNota(e.target.value)} placeholder="Transferencia, efectivo..."/>
            </div>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button className="btn btn-gold" style={{flex:1}} onClick={handleGuardarLibre} disabled={montoNum<=0}>
              💰 Registrar Abono
            </button>
            <button className="btn btn-outline" onClick={onClose}>Cancelar</button>
          </div>
        </>)}
      </div>
    </div>
  );
}

              : recibo.ventaId ? ventas.find(v=>v.id===recibo.ventaId)

/* ══════════════════════════════════════════════════
   NÚMERO A LETRAS (Español)
══════════════════════════════════════════════════ */
function numToWords(num){
  const n=Math.floor(Number(num)||0);
  const u=["","UN","DOS","TRES","CUATRO","CINCO","SEIS","SIETE","OCHO","NUEVE","DIEZ","ONCE","DOCE","TRECE","CATORCE","QUINCE","DIECISÉIS","DIECISIETE","DIECIOCHO","DIECINUEVE"];
  const d=["","","VEINTE","TREINTA","CUARENTA","CINCUENTA","SESENTA","SETENTA","OCHENTA","NOVENTA"];
  const c=["","CIENTO","DOSCIENTOS","TRESCIENTOS","CUATROCIENTOS","QUINIENTOS","SEISCIENTOS","SETECIENTOS","OCHOCIENTOS","NOVECIENTOS"];
  if(n===0) return "CERO";
  if(n===100) return "CIEN";
  if(n<20) return u[n];
  if(n<100) return d[Math.floor(n/10)]+(n%10?` Y ${u[n%10]}`:"");
  if(n<1000) return c[Math.floor(n/100)]+(n%100?` ${numToWords(n%100)}`:"");
  if(n<1000000){
    const m=Math.floor(n/1000);
    const r=n%1000;
    return (m===1?"MIL":`${numToWords(m)} MIL`)+(r?` ${numToWords(r)}`:"");
  }
  return n.toString();
}

function ListaPreciosPDF({lotes,onClose}){
  const estilos=`
    @media print{ .no-print-lista{display:none!important;} body{margin:0;} }
    .lista-doc{ font-family:Arial,sans-serif; font-size:10pt; color:#000; padding:20px; }

    .lista-doc table{ width:100%; border-collapse:collapse; margin-bottom:20px; }
    .lista-doc th{ background:#1a4d1a; color:#fff; padding:6px 8px; text-align:center; font-size:8.5pt; }
    .lista-doc td{ padding:5px 8px; border-bottom:1px solid #ddd; font-size:8.5pt; text-align:right; }
    .lista-doc td:first-child{ text-align:center; font-weight:700; }
    .lista-doc tr:nth-child(even){ background:#f5fbf5; }
    .lista-doc .bloque-header{ background:#e8f5e8; font-weight:700; color:#1a4d1a; padding:8px 10px; font-size:10pt; margin:10px 0 4px; border-left:4px solid #1a4d1a; }
    .lista-doc .total-col{ color:#1a4d1a; font-weight:700; }
    .lista-doc .cuotas-col{ color:#c9a84c; font-weight:700; }
  `;
  const bloques=[...new Set(lotes.map(l=>l.manzana||"Sin bloque"))].sort();
  const fmtN=n=>Number(n||0).toLocaleString("es-HN",{minimumFractionDigits:2,maximumFractionDigits:2});
  return(
    <div className="modal-overlay" style={{zIndex:3000,overflowY:"auto",alignItems:"flex-start",paddingTop:20}}>
      <div style={{background:"var(--surface)",borderRadius:12,maxWidth:1000,width:"100%",maxHeight:"90vh",overflowY:"auto"}}>
        <div className="no-print-lista" style={{display:"flex",gap:10,padding:"12px 16px",borderBottom:"1px solid var(--border)"}}>
          <button className="btn btn-outline btn-sm" onClick={onClose}>← Cerrar</button>
          <button className="btn btn-gold btn-sm" onClick={()=>{
            const fN=n=>Number(n||0).toLocaleString("es-HN",{minimumFractionDigits:2,maximumFractionDigits:2});
            const blqs=[...new Set(lotes.map(l=>l.manzana||"Sin bloque"))].sort();
            let tablas="";
            blqs.forEach(bloque=>{
              const bL=lotes.filter(l=>(l.manzana||"Sin bloque")===bloque);
              let filas=bL.map(l=>{
                const px=calcLotePrecios(l);
                return `<tr><td>${l.numero}</td><td>${px.m2>0?fN(px.m2):"—"}</td><td>${px.v2>0?fN(px.v2):"—"}</td><td>L.${fN(px.vv)}</td><td class="tc">L.${fN(px.total)}</td><td>L.${fN(px.pr)}</td><td>L.${fN(px.subtotal)}</td><td>L.${fN(px.cm)}</td><td class="cc">${px.nCuotas}</td></tr>`;
              }).join("");
              tablas+=`<div class="bh">BLOQUE ${bloque} — ${bL.length} lotes</div><table><thead><tr><th>Lote</th><th>M²</th><th>V²</th><th>Valor V²</th><th>Total Terreno</th><th>Prima</th><th>Subtotal</th><th>Cuota Mensual</th><th>Cant. Cuotas</th></tr></thead><tbody>${filas}</tbody></table>`;
            });
            const w=window.open("","_blank","width=1100,height=820");
            w.document.write(`<!DOCTYPE html><html><head><meta charset='utf-8'/><title>Lista de Precios — Villa Panamericana</title><style>
              body{font-family:Arial,sans-serif;font-size:10pt;padding:24px;color:#000;}
              h2{text-align:center;font-size:14pt;color:#1a4d1a;margin-bottom:4px;}
              .sub{text-align:center;font-size:9pt;color:#666;margin-bottom:10px;}
              table{width:100%;border-collapse:collapse;margin-bottom:20px;}
              th{background:#1a4d1a;color:#fff;padding:6px 8px;text-align:center;font-size:8.5pt;}
              td{padding:5px 8px;border-bottom:1px solid #ddd;font-size:8.5pt;text-align:right;}
              td:first-child{text-align:center;font-weight:700;}
              tr:nth-child(even){background:#f5fbf5;}
              .bh{background:#e8f5e8;font-weight:700;color:#1a4d1a;padding:7px 10px;font-size:10pt;margin:14px 0 4px;border-left:4px solid #1a4d1a;display:block;}
              .tc{color:#1a4d1a;font-weight:700;}.cc{color:#c9a84c;font-weight:700;}
              .note{font-size:8pt;color:#999;text-align:center;margin-top:10px;}
              @media print{.no-print{display:none!important;}}
            </style></head><body>
            <h2>LOTIFICADORA VILLA PANAMERICANA</h2>
            <div class='sub'>Lista de Precios — ${new Date().toLocaleDateString("es-HN")} · ${lotes.length} lotes</div>
            <div class='sub'>Valor vara cuadrada: L.1,007 | Prima inicial: L.2,000 | Cuota mensual: L.2,000</div>
            ${tablas}
            <div class='note'>* Total = V² × Valor vara | Subtotal = Total − Prima | Cant. Cuotas = Subtotal ÷ Cuota mensual</div>
            <div class='no-print' style='text-align:center;margin-top:24px;'>
              <button onclick='window.print()' style='padding:10px 32px;background:#1a4d1a;color:#fff;border:none;border-radius:6px;font-size:12pt;cursor:pointer;'>🖨 Imprimir / Guardar PDF</button>
            </div>
            </body></html>`);
            w.document.close();
          }}>🖨 Descargar / Imprimir PDF</button>
          <span style={{fontSize:".78rem",color:"var(--muted)",alignSelf:"center"}}>{lotes.length} lotes · actualizado en tiempo real</span>
        </div>
        <style>{estilos}</style>
        <div className="lista-doc">
          <h2>LOTIFICADORA VILLA PANAMERICANA</h2>
          <div className="sub">San Lorenzo 3 — Lista de Precios por Lote · {new Date().toLocaleDateString("es-HN")}</div>
          <div className="sub">Valor vara cuadrada: L.1,007 | Prima: L.2,000 | Cuota mensual: L.2,000</div>
          <div id="lista-precios-table">
          {bloques.map(bloque=>{
            const bLotes=lotes.filter(l=>(l.manzana||"Sin bloque")===bloque);
            return(
              <div key={bloque}>
                <div className="bloque-header">BLOQUE {bloque} — {bLotes.length} lotes</div>
                <table>
                  <thead>
                    <tr>
                      <th>Lote</th><th>M²</th><th>V²</th><th>Valor V² (L.)</th><th>Total Terreno</th><th>Prima</th><th>Subtotal</th><th>Cuota Mensual</th><th>Cant. Cuotas</th>
                    </tr>
                  </thead>
                  <tbody>
                    {bLotes.map(l=>{
                      const px=calcLotePrecios(l);
                      return(
                        <tr key={l.id}>
                          <td>{l.numero}</td>
                          <td>{px.m2>0?fmtN(px.m2):"—"}</td>
                          <td>{px.v2>0?fmtN(px.v2):"—"}</td>
                          <td>L.{fmtN(px.vv)}</td>
                          <td className="total-col">L.{fmtN(px.total)}</td>
                          <td>L.{fmtN(px.pr)}</td>
                          <td>L.{fmtN(px.subtotal)}</td>
                          <td>L.{fmtN(px.cm)}</td>
                          <td className="cuotas-col">{px.nCuotas}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            );
          })}
          </div>{/* end lista-precios-table */}
          <div style={{fontSize:"8pt",color:"#999",textAlign:"center",marginTop:10}}>
            * Precios calculados automáticamente. Total = V² × Valor vara. Subtotal = Total − Prima. Cuotas = Subtotal ÷ Cuota mensual.
          </div>
        </div>
      </div>
    </div>
  );
}
