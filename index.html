/* ══════════════════════════════════════════════════
   AUTH SEGURO — SHA-256 + salt + password policy
══════════════════════════════════════════════════ */
const AUTH_KEY = "hn_auth";
const SESSION_KEY = "hn_session";

function getStoredAuth() {
  try { return localStorage.getItem(AUTH_KEY) || null; } catch { return null; }
}
async function setStoredAuth(password) {
  const salt = Array.from(crypto.getRandomValues(new Uint8Array(16)))
    .map(b => b.toString(16).padStart(2,"0")).join("");
  const hash = await hashPassword(password, salt);
  localStorage.setItem(AUTH_KEY, JSON.stringify({ salt, hash, v:2 }));
}
async function hashPassword(password, salt) {
  const enc = new TextEncoder();
  const data = enc.encode(salt + password);
  const buf  = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
async function checkAuth(password) {
  const raw = getStoredAuth();
  if (!raw) return false;
  try {
    const { salt, hash } = JSON.parse(raw);
    return (await hashPassword(password, salt)) === hash;
  } catch { return false; }
}
// Sesión de pestaña: se mantiene mientras el navegador esté abierto
function isSessionActive() {
  try { return sessionStorage.getItem("hn_sess") === "1"; } catch { return false; }
}
function markSession() {
  try { sessionStorage.setItem("hn_sess", "1"); } catch {}
}
function clearSession() {
  try {
    sessionStorage.removeItem("hn_sess");
    localStorage.removeItem("hn_session");
    localStorage.removeItem("hn_session_long");
    localStorage.removeItem("hn_remember");
  } catch {}
}

function getStrength(pwd) {
  let s = 0;
  if (pwd.length >= 8)              s++;
  if (pwd.length >= 12)             s++;
  if (/[A-Z]/.test(pwd))           s++;
  if (/[0-9]/.test(pwd))           s++;
  if (/[^A-Za-z0-9]/.test(pwd))   s++;
  return s; // 0-5
}

function AuthScreen({ onUnlock }) {
  const stored = getStoredAuth();
  const isSetup = !stored;
  // steps: setup | confirmSetup | login | changeOld | changeNew | changeConfirm
  const [step,    setStep]    = useState(isSetup ? "setup" : "login");
  const [pwd,     setPwd]     = useState("");
  const [confirm, setConfirm] = useState("");
  const [newPwd,  setNewPwd]  = useState("");
  const [show,    setShow]    = useState(false);

  const [remember,setRemember]= useState(!!localStorage.getItem("hn_remember"));

  // Auto-fill: si el navegador tiene la clave guardada, rellena el campo
  React.useEffect(()=>{
    if(step !== "login") return;
    if(!navigator?.credentials?.get) return;
    navigator.credentials.get({ password:true, mediation:"optional" })
      .then(cred => {
        if(cred?.password) {
          setPwd(cred.password);
          // NO hacemos auto-login — el usuario tiene que presionar Ingresar
        }
      })
      .catch(()=>{});
  },[step]);

  const strength = getStrength(step === "changeNew" ? newPwd : pwd);
  const checks = {
    len:     (step === "changeNew" ? newPwd : pwd).length >= 8,
    upper:   /[A-Z]/.test(step === "changeNew" ? newPwd : pwd),
    num:     /[0-9]/.test(step === "changeNew" ? newPwd : pwd),
    special: /[^A-Za-z0-9]/.test(step === "changeNew" ? newPwd : pwd),
  };
  const pwdOk = checks.len && checks.upper && checks.num && checks.special;

  const strengthColor = ["#e05252","#e07a52","#e0c052","#8bc34a","#4caf50"][Math.min(strength,4)];
  const strengthLabel = ["Muy débil","Débil","Regular","Fuerte","Muy fuerte"][Math.min(strength,4)];

      setLoading(true);

    } else if (step === "confirmSetup") {

      setLoading(true);
      await setStoredAuth(pwd);
      markSession(); setOk(true);
      setTimeout(() => onUnlock(), 700);

    } else if (step === "login") {
      if (!pwd) { setError("Escribe tu contraseña"); return; }
      setLoading(true);
      const ok2 = await checkAuth(pwd);
      setLoading(false);
      if (ok2) {
        // Guardar cred en el gestor del navegador (Chrome/Edge en HTTPS)
        try {
          if(window.PasswordCredential) {
            const cred = new PasswordCredential({ id:"solareshn", password:pwd, name:"SolaresHN" });
            navigator.credentials.store(cred);
          }
        } catch {}
        markSession(); setOk(true);
        setTimeout(() => onUnlock(), 600);
      }
      else { setError("Contraseña incorrecta"); setPwd(""); }

    } else if (step === "changeOld") {
      if (!pwd) { setError("Escribe tu contraseña actual"); return; }
      setLoading(true);
      const ok2 = await checkAuth(pwd);
      setLoading(false);
      if (ok2) { setPwd(""); setNewPwd(""); setStep("changeNew"); }
      else { setError("Contraseña incorrecta"); setPwd(""); }

    } else if (step === "changeNew") {
      if (!pwdOk) { setError("La contraseña no cumple los requisitos"); return; }
      setStep("changeConfirm");

    } else if (step === "changeConfirm") {
      if (confirm !== newPwd) { setError("No coinciden"); setConfirm(""); return; }
      setLoading(true);
      await setStoredAuth(newPwd);
      markSession();
      setOk(true);
      setTimeout(() => onUnlock(), 700);
    }
  };

          </button>
        </div>

        {/* Strength bar */}
        {showStrength && (
          <div>
            <div style={{ display:"flex", gap:4, marginBottom:4 }}>
              {[1,2,3,4,5].map(i => (
                <div key={i} style={{ flex:1, height:4, borderRadius:4, background: i <= strength ? strengthColor : "#2e4a2e", transition:"background .3s" }}/>
              ))}
            </div>
            <div style={{ fontSize:"0.7rem", color: strengthColor, textAlign:"right" }}>{strengthLabel}</div>
          </div>
        )}

        {/* Requirements */}
        {showChecks && (
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"4px 12px" }}>
            {[
              [checks.len,     "8+ caracteres"],
              [checks.upper,   "1 mayúscula"],
              [checks.num,     "1 número"],
              [checks.special, "1 símbolo (!@#...)"],
            ].map(([ok2, label]) => (
              <div key={label} style={{ display:"flex", alignItems:"center", gap:5, fontSize:"0.72rem", color: ok2 ? "#4caf50" : "#4a6a4a" }}>
                <span>{ok2 ? "✓" : "○"}</span>{label}
              </div>
            ))}
          </div>
        )}

        {/* Error */}
        {error && <div style={{ color:"#e05252", fontSize:"0.78rem", textAlign:"center", fontWeight:600 }}>{error}</div>}

        {/* Hint gestor contraseñas */}
        {step === "login" && (
          <div style={{fontSize:"0.72rem",color:"#4a6a4a",textAlign:"center"}}>
            🔑 El navegador puede guardar tu contraseña
          </div>
        )}
        {/* Submit */}
        <button
          onClick={handleSubmit}
          disabled={loading || ok}
          style={{ padding:"12px", borderRadius:10, border:"none", background: ok ? "#4caf50" : pwdOk || !showChecks ? "#c9a84c" : "#2e4a2e", color: ok ? "#fff" : "#0f1a0f", fontSize:"0.95rem", fontWeight:700, cursor: loading||ok ? "default" : "pointer", transition:"background .3s", opacity: loading ? 0.7 : 1 }}
        >
          {ok ? "✓ Acceso concedido" : loading ? "Verificando..." : step === "setup" ? "Continuar" : step === "confirmSetup" ? "Crear contraseña" : step === "login" ? "Ingresar" : step === "changeOld" ? "Verificar" : step === "changeNew" ? "Continuar" : "Guardar"}
        </button>
        </form>

        {/* Back / Change */}
        {showBack && (
          <button onClick={handleCancel} style={{ background:"none", border:"1px solid #2e4a2e", color:"#6b8a6b", fontSize:"0.78rem", borderRadius:8, padding:"7px", cursor:"pointer" }}>
            Cancelar
          </button>
        )}
        {showChange && (
          <button onClick={()=>{setStep("changeOld");setPwd("");setError("");}} style={{ background:"none", border:"none", color:"#4a6a4a", fontSize:"0.72rem", cursor:"pointer", textDecoration:"underline" }}>
            Cambiar contraseña
          </button>
        )}
      </div>

      {step === "setup" && (
        <div style={{ fontSize:"0.68rem", color:"#3a5a3a", textAlign:"center", maxWidth:300 }}>
          Tu contraseña se almacena con cifrado SHA-256 y sal aleatoria.
        </div>
      )}
    </div>
  );

// ── Colección Firestore para la lotificadora ──
const FB_COL = "solaresHN"; // nombre de la colección en Firestore

async function dbLoad(key) {
  // Primero cargar de localStorage (rápido y offline)
  let local = [];
  try {
    const v = localStorage.getItem(key);
    if (v) local = JSON.parse(v);
  } catch {}

  // Si Firebase está listo, intentar cargar de Firestore
  if (FB_READY && _fbDB) {
    try {
      const doc = await _fbDB.collection(FB_COL).doc(key).get();
      if (doc.exists) {
        const data = doc.data().value || [];
        // Actualizar localStorage con dato fresco
        localStorage.setItem(key, JSON.stringify(data));
        return data;
      }
    } catch(e) {
      console.warn("Firebase load fallback a localStorage:", key, e.message);
    }
  }
  return local;
}

async function dbSave(key, data) {
  // Siempre guardar en localStorage (instantáneo)
  try { localStorage.setItem(key, JSON.stringify(data)); } catch {}

  // Sincronizar con Firebase en segundo plano
  if (FB_READY && _fbDB) {
    try {
      await _fbDB.collection(FB_COL).doc(key).set({
        value: data,
        updatedAt: new Date().toISOString()
      });
    } catch(e) {
      console.warn("Firebase save error (guardado local):", key, e.message);
    }
  }
}

const addMonths = (ds,n) => { const d=new Date(ds+"T12:00:00"); d.setMonth(d.getMonth()+n); return d.toISOString().slice(0,10); };
const daysDiff  = (ds) => { const d=new Date(ds+"T12:00:00"); const n=new Date(); n.setHours(0,0,0,0); return Math.ceil((d-n)/86400000); };
const generarCuotas = (v) => {
  if(!v||!v.numCuotas||!v.fechaInicio) return [];
  return Array.from({length:Number(v.numCuotas)},(_,i)=>({
    num:i+1, fecha:addMonths(v.fechaInicio,i+1), monto:Number(v.montoCuota)
  }));
};
// ── Lógica de cuotas según precio ──
// precio ≤ 260,000 → prima = L.2,000, cuota mensual = L.2,000
//   nCuotas (total) = ceil(precio/2000)  →  cuotas mensuales a pagar = nCuotas - 1
// precio > 260,000 → prima = ceil(precio/130) = cuota mensual
//   nCuotas (total) = 130                →  cuotas mensuales a pagar = 129
const calcCuotaLogic = (precio) => {
  const p = Number(precio||0);
  if(p <= 0) return {nCuotas:0, cuota:2000, prima:2000};
  if(p <= 260000){
    const nCuotas = Math.ceil(p / 2000);   // total incluyendo prima como cuota #1
    return {nCuotas, cuota:2000, prima:2000};
  } else {
    const cuota = Math.ceil(p / 130);      // precio ÷ 130 cuotas
    return {nCuotas:130, cuota, prima:cuota}; // prima = cuota, mensuales = 129
  }
};
const calcCuotaFn = (precio,prima,nc) => {
  // Retorna la cuota mensual según el precio
  const {cuota} = calcCuotaLogic(precio);
  return cuota.toFixed(2);
};

// Calcula precios de un lote según sus campos reales
const calcLotePrecios = l => {
  const descV2 = l.medidaV2 ? null : (l.descripcion||"").match(/^([\d.]+)\s*v/i);
  const v2 = Number(l.medidaV2 || (descV2?descV2[1]:0) || 0);
  const m2 = Number(l.medidaM2||l.medida||0);
  const _mz = (l.manzana||'').toString().trim().toUpperCase();
  const _vvDefault = (_mz==='A1'||_mz==='A2') ? 1200 : 1007;
  const vv = Number(l.valorVara||_vvDefault);
  const total = v2>0 ? v2*vv : Number(l.precio||0);
  const {nCuotas, cuota:cm, prima:prCalc} = calcCuotaLogic(total);
  // Si el lote tiene prima guardada manualmente la respetamos, sino usamos la calculada
  const pr = Number(l.prima||0) || prCalc;
  const subtotal = Math.max(0,total - pr);
  return {v2,m2,vv,pr,cm,total,subtotal,nCuotas};
};

function FbBadge() {
  const [status, setStatus] = React.useState(window.FB_READY_FLAG ? "offline" : "local");
  React.useEffect(()=>{
    if(!window.FB_READY_FLAG) return;
    const t = setInterval(()=>{
      setStatus(window._fbOnline ? "online" : "offline");
    }, 2000);
    return ()=>clearInterval(t);
  },[]);
  const cfg = {
    online:  {bg:"#1a4d1a", color:"#6ddf6d", label:"🔥 Firebase"},
    offline: {bg:"#3a1a1a", color:"#df6d6d", label:"🔥 Sin conexión"},
    local:   {bg:"#2a2a1a", color:"#c9a84c",  label:"💾 Local"},
  };
  const s = cfg[status] || cfg.local;
  return(
    <span style={{
      background:s.bg, color:s.color, fontSize:".68rem", fontWeight:700,
      padding:"3px 8px", borderRadius:20, border:"1px solid", borderColor:s.color,
      letterSpacing:".3px", whiteSpace:"nowrap"
    }}>{s.label}</span>
  );
}

function App() {
  const [tab,      setTab]      = useState("dashboard");
  const [clientes, setClientes] = useState([]);
  const [lotes,    setLotes]    = useState([]);
  const [ventas,   setVentas]   = useState([]);
  const [pagos,    setPagos]    = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [unlocked, setUnlocked] = useState(isSessionActive());
  const [lockConfirm, setLockConfirm] = useState(false);
  const [splashDone, setSplashDone] = useState(false);

  useEffect(()=>{
    (async()=>{
      const [c,l,v,p] = await Promise.all([
        dbLoad("hn_clientes"),dbLoad("hn_lotes"),dbLoad("hn_ventas"),dbLoad("hn_pagos")
      ]);
      setClientes(c);

      // ─── ID DETERMINISTICO para lotes ───────────────────────────────
      // ID fijo: "lote-{manzana}-{numero}" — estable entre sesiones
      const makeLoteId = lo => `lote-${lo.manzana||"X"}-${lo.numero||"0"}`;

      let lotesFinales;
      if(!l || l.length===0){
        // Primera carga: inicializar con IDs determinísticos
        lotesFinales = SAN_LORENZO_LOTES.map(lo=>({...lo,id:makeLoteId(lo),createdAt:today()}));
      } else {
        // Migración: si los lotes guardados no tienen id o tienen uid aleatorio, reasignar
        lotesFinales = l.map(lo=>{
          const detId = makeLoteId(lo);
          // Si no tiene id o el id es un uid (no empieza con "lote-"), corregir
          if(!lo.id || !String(lo.id).startsWith("lote-")){
            return {...lo, id: detId};
          }
          return lo;
        });
      }
      dbSave("hn_lotes", lotesFinales);
      setLotes(lotesFinales);

      // ─── Migración de ventas: reparar loteId / loteNumero / loteBloque + recalcular cuotas ───
      let ventasFixed = (v||[]).map(vn=>{
        // Buscar lote por id actual
        let lt = lotesFinales.find(lo=>String(lo.id)===String(vn.loteId));
        if(!lt){
          if(vn.loteNumero && vn.loteBloque){
            lt = lotesFinales.find(lo=>String(lo.numero)===String(vn.loteNumero) && String(lo.manzana)===String(vn.loteBloque));
          }
        }
        let updated = lt ? {...vn, loteId:lt.id, loteNumero:lt.numero, loteBloque:lt.manzana} : {...vn};
        // Recalcular montoCuota y numCuotas según nueva lógica de precios
        if(updated.precio){
          const {nCuotas:nc, cuota:cm, prima:prCalc} = calcCuotaLogic(updated.precio);
          const primaFinal = Number(updated.prima)||prCalc;
          updated = {...updated, numCuotas:String(nc), montoCuota:String(cm), prima:String(primaFinal)};
        }
        return updated;
      });
      const ventasChanged = JSON.stringify(ventasFixed) !== JSON.stringify(v||[]);
      if(ventasChanged) dbSave("hn_ventas", ventasFixed);
      setVentas(ventasFixed);
      setPagos(p);
      setLoading(false);
    })();
  },[]);

  // ── Auto-sync: File System Access API ──────────────────────────────────
  const SYNC_IDB_KEY = "hn_sync_filehandle";

  // Guardar/leer el FileHandle en IndexedDB (localStorage no puede guardar objetos)
  const getIDB = (key) => new Promise((res,rej)=>{
    const req = indexedDB.open("SolaresHN_IDB",1);
    req.onupgradeneeded = e => e.target.result.createObjectStore("handles");
    req.onsuccess = e => {
      const db = e.target.result;
      const tx = db.transaction("handles","readonly");
      const r  = tx.objectStore("handles").get(key);
      r.onsuccess = () => res(r.result||null);
      r.onerror   = () => res(null);
    };
    req.onerror = () => res(null);
  });
  const setIDB = (key, val) => new Promise((res,rej)=>{
    const req = indexedDB.open("SolaresHN_IDB",1);
    req.onupgradeneeded = e => e.target.result.createObjectStore("handles");
    req.onsuccess = e => {
      const db = e.target.result;
      const tx = db.transaction("handles","readwrite");
      tx.objectStore("handles").put(val,key);
      tx.oncomplete = ()=>res();
      tx.onerror    = ()=>rej();
    };
    req.onerror = ()=>rej();
  });

  const autoSync = async (data) => {
    if(!window.showSaveFilePicker) return; // navegador no soporta
    try {
      let fh = await getIDB(SYNC_IDB_KEY);
      if(!fh) return; // no configurado aún
      // Verificar permiso
      const perm = await fh.queryPermission({mode:"readwrite"});
      if(perm !== "granted"){
        const req = await fh.requestPermission({mode:"readwrite"});
        if(req !== "granted") return;
      }
      const w = await fh.createWritable();
      await w.write(JSON.stringify(data, null, 2));
      await w.close();
    } catch(e) {
      console.warn("AutoSync error:", e);
    }
  };

  const handleConfigSync = async () => {
    if(!window.showSaveFilePicker){
      alert("Tu navegador no soporta esta función.\nUsa Chrome o Edge en PC/Mac.");
      return;
    }
    try {
      const fh = await window.showSaveFilePicker({
        suggestedName: "SolaresHN_backup.json",
        types:[{description:"Backup SolaresHN",accept:{"application/json":[".json"]}}],
        startIn: "documents"
      });
      await setIDB(SYNC_IDB_KEY, fh);
      // Guardar inmediatamente
      const data = {clientes,lotes,ventas,pagos,exportedAt:new Date().toISOString()};
      const w = await fh.createWritable();
      await w.write(JSON.stringify(data, null, 2));
      await w.close();
      alert("✅ Sincronización configurada.\n\nGuarda el archivo en tu carpeta de OneDrive o Google Drive.\nA partir de ahora cada cambio se guardará automáticamente ahí.");
    } catch(e) {
      if(e.name==="AbortError") return;
      alert("Error: " + e.message);
    }
  };

  // ────────────────────────────────────────────────────────────────────────
  const _buildData = (c,l,v,p) => ({clientes:c,lotes:l,ventas:v,pagos:p,exportedAt:new Date().toISOString()});

  const saveClientes = d=>{setClientes(d);dbSave("hn_clientes",d); autoSync(_buildData(d,lotes,ventas,pagos));};
  const saveLotes    = d=>{setLotes(d);   dbSave("hn_lotes",d);    autoSync(_buildData(clientes,d,ventas,pagos));};
  const saveVentas   = d=>{setVentas(d);  dbSave("hn_ventas",d);   autoSync(_buildData(clientes,lotes,d,pagos));};
  const savePagos    = d=>{setPagos(d);   dbSave("hn_pagos",d);    autoSync(_buildData(clientes,lotes,ventas,d));};

  const handleExport = () => {
    const data = { clientes, lotes, ventas, pagos, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type:"application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = `SolaresHN_backup_${today()}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  const handleExportCloud = async () => {
    const data = { clientes, lotes, ventas, pagos, exportedAt: new Date().toISOString() };
    const json = JSON.stringify(data, null, 2);
    const fileName = "SolaresHN_backup.json";
    const blob = new Blob([json], { type: "application/json" });

    // Web Share API — abre el menú compartir nativo del celular/PC
    if(navigator.share && navigator.canShare && navigator.canShare({ files:[new File([blob],fileName,{type:"application/json"})] })){
      try{
        await navigator.share({
          title: "Backup SolaresHN",
          text: "Backup de datos SolaresHN — " + today(),
          files: [new File([blob], fileName, { type:"application/json" })]
        });
        return;
      }catch(e){
        if(e.name==="AbortError") return; // usuario canceló
      }
    }
    // Fallback: descarga directa
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = fileName; a.click();
    URL.revokeObjectURL(url);
  };

  const handleImport = () => {
    const input = document.createElement("input");
    input.type = "file"; input.accept = ".json";
    input.onchange = e => {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const d = JSON.parse(ev.target.result);
          if (!confirm(`¿Restaurar backup?\nClientes: ${d.clientes?.length||0}, Lotes: ${d.lotes?.length||0}, Contratos: ${d.ventas?.length||0}, Pagos: ${d.pagos?.length||0}\n\nEsto REEMPLAZA los datos actuales.`)) return;
          if (d.clientes) saveClientes(d.clientes);
          if (d.lotes)    saveLotes(d.lotes);
          if (d.ventas)   saveVentas(d.ventas);
          if (d.pagos)    savePagos(d.pagos);
          alert("✅ Datos restaurados correctamente.");
        } catch { alert("❌ Archivo inválido."); }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  if (!splashDone) return <SplashScreen onDone={()=>setSplashDone(true)} />;
  if (!unlocked) return <AuthScreen onUnlock={()=>setUnlocked(true)} />;

  if(loading) return(
    <>

      </div>
    </>
  );

  const props={clientes,lotes,ventas,pagos,saveClientes,saveLotes,saveVentas,savePagos};
  return(
    <>
      <style>{STYLE}</style>
      <div className="app-root">
        <header className="app-header no-print">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>

/* ══════════════════════════════════════════════════
   IMPORTAR LOTES SAN LORENZO 3 — Editor Masivo
══════════════════════════════════════════════════ */
function ImportLotesSL3({ lotes, saveLotes, onClose }) {
  const [filas, setFilas] = useState(() =>
    SAN_LORENZO_LOTES.map((l, i) => ({ ...l, _id: i, activo: true }))
  );
  const [precio, setPrecio] = useState("0");
  const [medida, setMedida] = useState("150");
  const [unidad, setUnidad] = useState("varas²");
  const [applied, setApplied] = useState(false);

  const applyGlobal = () => {
    setFilas(f => f.map(r => ({
      ...r,
      precio: precio || r.precio,
      medida: medida || r.medida,
      unidad: unidad || r.unidad,
    })));
    setApplied(true);
  };

  const updateFila = (id, field, val) => {
    setFilas(f => f.map(r => r._id === id ? { ...r, [field]: val } : r));
  };

  const toggleFila = (id) => {
    setFilas(f => f.map(r => r._id === id ? { ...r, activo: !r.activo } : r));
  };

  const handleImport = () => {
    const seleccionados = filas.filter(r => r.activo);
    if (seleccionados.length === 0) return alert("Selecciona al menos un lote");
    
    // Verificar duplicados
    const duplicados = seleccionados.filter(r =>
      lotes.some(l => l.numero === r.numero && l.manzana === r.manzana && l.proyecto === r.proyecto)
    );
    if (duplicados.length > 0) {
      const lista = duplicados.slice(0,5).map(d => `Lote ${d.numero} M.${d.manzana}`).join(", ");
      if (!confirm(`⚠️ ${duplicados.length} lote(s) ya existen (${lista}...)\n¿Continuar e importar solo los nuevos?`)) return;
    }
    
    const nuevos = seleccionados
      .filter(r => !lotes.some(l => l.numero === r.numero && l.manzana === r.manzana && l.proyecto === r.proyecto))
      .map(({ _id, activo, ...rest }) => ({ ...rest, id: uid(), createdAt: today() }));
    
    if (nuevos.length === 0) return alert("Todos los lotes seleccionados ya existen.");
    
    saveLotes([...lotes, ...nuevos]);
    alert(`✅ ${nuevos.length} lotes importados correctamente.`);
    onClose();
  };

  const manzanas = [...new Set(filas.map(r => r.manzana))].sort();
  const activos = filas.filter(r => r.activo).length;

  return (
    <div>
      {/* Panel de aplicación masiva */}
      <div className="card" style={{borderColor:"var(--blue)",padding:12,marginBottom:12}}>
        <div style={{fontSize:".72rem",color:"var(--blue)",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",marginBottom:8}}>
          ⚡ Aplicar a todos los lotes
        </div>
        <div className="form-row">
          <div className="form-group" style={{marginBottom:6}}>
            <label>Medida</label>
            <input type="number" value={medida} onChange={e=>setMedida(e.target.value)} placeholder="150"/>
          </div>
          <div className="form-group" style={{marginBottom:6}}>
            <label>Unidad</label>
            <select value={unidad} onChange={e=>setUnidad(e.target.value)}>
              <option>varas²</option><option>m²</option><option>manzanas</option>
            </select>
          </div>
        </div>
        <div className="form-group" style={{marginBottom:8}}>
          <label>Precio L. (0 = sin precio aún)</label>
          <input type="number" value={precio} onChange={e=>setPrecio(e.target.value)} placeholder="0"/>
        </div>
        <button className="btn btn-gold" style={{width:"100%"}} onClick={applyGlobal}>
          ⚡ Aplicar a los {filas.filter(r=>r.activo).length} lotes seleccionados
        </button>
        {applied && <div style={{color:"var(--green)",fontSize:".78rem",marginTop:6,textAlign:"center"}}>✅ Datos aplicados — revisa abajo y confirma</div>}
      </div>

      {/* Lista por manzana */}
      <div style={{fontSize:".72rem",color:"var(--muted)",marginBottom:8}}>
        {activos} lotes seleccionados de 75 · Toca ✓ para incluir/excluir
      </div>

      {manzanas.map(mz => {
        const mzFilas = filas.filter(r => r.manzana === mz);
        return (
          <div key={mz} style={{marginBottom:12}}>
            <div style={{fontFamily:"Playfair Display,serif",color:"var(--gold)",fontSize:".92rem",fontWeight:700,marginBottom:6}}>
              Manzana {mz} <span style={{color:"var(--muted)",fontSize:".72rem",fontWeight:400}}>({mzFilas.length} lotes)</span>
            </div>
            {mzFilas.map(fila => (
              <div key={fila._id} style={{
                display:"grid", gridTemplateColumns:"30px 40px 1fr 1fr",
                gap:6, alignItems:"center", padding:"5px 0",
                borderBottom:"1px solid var(--border)",
                opacity: fila.activo ? 1 : 0.4
              }}>
                <button onClick={()=>toggleFila(fila._id)} style={{
                  background: fila.activo ? "var(--green)" : "var(--surface)",
                  border:"1px solid var(--border)", borderRadius:6,
                  color: fila.activo ? "#0f1a0f" : "var(--muted)",
                  width:26,height:26,cursor:"pointer",fontSize:".75rem",fontWeight:700
                }}>{fila.activo?"✓":"○"}</button>
                <span style={{fontSize:".78rem",color:"var(--muted)",fontWeight:700}}>#{fila.numero}</span>
                <input
                  type="number" value={fila.medida}
                  onChange={e=>updateFila(fila._id,"medida",e.target.value)}
                  style={{background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text)",borderRadius:6,padding:"4px 6px",fontSize:".78rem"}}
                  placeholder="Medida"
                />
                <input
                  type="number" value={fila.precio}
                  onChange={e=>updateFila(fila._id,"precio",e.target.value)}
                  style={{background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text)",borderRadius:6,padding:"4px 6px",fontSize:".78rem"}}
                  placeholder="Precio L."
                />
              </div>
            ))}
          </div>
        );
      })}

      <div style={{display:"flex",gap:10,marginTop:16,position:"sticky",bottom:0,background:"var(--card)",paddingTop:10}}>
        <button className="btn btn-gold" style={{flex:1}} onClick={handleImport}>
          ✅ Importar {activos} Lotes
        </button>
        <button className="btn btn-outline" onClick={onClose}>Cancelar</button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   DASHBOARD
══════════════════════════════════════════════════ */
function Dashboard({clientes,lotes,ventas,pagos,setTab}){
  const disponibles = lotes.filter(l=>l.estado==="disponible").length;
  const vendidos    = lotes.filter(l=>l.estado==="vendido").length;
  const mesActual   = today().slice(0,7);
  const ingresosMes = pagos.filter(p=>p.fecha?.startsWith(mesActual)).reduce((s,p)=>s+Number(p.monto),0);
  const totalRec    = pagos.reduce((s,p)=>s+Number(p.monto),0);

  const alertas=[];
  ventas.filter(v=>v.estado==="activa").forEach(v=>{
    const pv=pagos.filter(p=>p.ventaId===v.id);
    const cl=clientes.find(c=>c.id===v.clienteId);
    const lt=lotes.find(l=>String(l.id)===String(v.loteId));
    generarCuotas(v).forEach(c=>{
      const paid=pv.some(p=>p.tipo==="cuota"&&Number(p.numCuota)===c.num);
      if(paid) return;
      const diff=daysDiff(c.fecha);
      if(diff<0)       alertas.push({tipo:"vencida",cuota:c,cl,lt,diff});
      else if(diff<=7) alertas.push({tipo:"proxima",cuota:c,cl,lt,diff});
    });
  });

  return(
    <div>
      <div className="stats-grid">
        <div className="stat-card"><div className="stat-val">{lotes.length}</div><div className="stat-lbl">Total Lotes</div></div>
        <div className="stat-card"><div className="stat-val" style={{color:"var(--green)"}}>{disponibles}</div><div className="stat-lbl">Disponibles</div></div>
        <div className="stat-card"><div className="stat-val" style={{color:"var(--gold)"}}>{vendidos}</div><div className="stat-lbl">Vendidos</div></div>
        <div className="stat-card"><div className="stat-val" style={{color:"var(--blue)"}}>{clientes.length}</div><div className="stat-lbl">Clientes</div></div>
      </div>

      <div className="card" style={{borderColor:"var(--gold)",marginBottom:14}}>
        <div style={{fontSize:".7rem",color:"var(--muted)",textTransform:"uppercase",letterSpacing:".5px",marginBottom:4}}>Ingresos este mes</div>
        <div style={{fontFamily:"Playfair Display,serif",fontSize:"1.65rem",color:"var(--gold)",fontWeight:700}}>{fmtL(ingresosMes)}</div>
        <div style={{fontSize:".78rem",color:"var(--muted)",marginTop:4}}>Total histórico cobrado: {fmtL(totalRec)}</div>
      </div>

      {alertas.length>0&&(
        <>
          <div className="section-title">⚡ Alertas de Pago ({alertas.length})</div>
          {alertas.slice(0,5).map((a,i)=>(
            <div key={i} className={`alert ${a.tipo==="vencida"?"alert-danger":"alert-warn"}`}>
              <Svg path={IC.warn} size={17}/>
              <div>
                <div style={{fontWeight:700}}>{a.tipo==="vencida"?`Cuota #${a.cuota.num} VENCIDA`:`Cuota #${a.cuota.num} — ${a.diff} día(s)`}</div>
                <div style={{fontSize:".79rem",opacity:.9}}>{a.cl?.nombre||"?"} · Lote {a.lt?.numero||"?"} · {fmtL(a.cuota.monto)} · {fmtDate(a.cuota.fecha)}</div>
              </div>
            </div>
          ))}
          {alertas.length>5&&<div style={{fontSize:".8rem",color:"var(--muted)",textAlign:"center",marginBottom:12}}>y {alertas.length-5} más...</div>}
        </>
      )}

      <div className="section-title">Acceso Rápido</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {[
          {label:"Nuevo Cliente", icon:IC.clients,tab:"clientes",color:"var(--blue)"},
          {label:"Nuevo Lote",    icon:IC.lote,   tab:"lotes",   color:"var(--green)"},
          {label:"Nueva Venta",   icon:IC.venta,  tab:"ventas",  color:"var(--gold)"},
          {label:"Registrar Pago",icon:IC.pago,   tab:"pagos",   color:"var(--orange)"},
        ].map(({label,icon,tab,color})=>(
          <button key={tab} className="quick-btn" style={{borderColor:color+"44"}} onClick={()=>setTab(tab)}>
            <div style={{color}}><Svg path={icon} size={22}/></div>
            <div style={{marginTop:8,fontSize:".83rem",fontWeight:700,color}}>{label}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   CLIENTES
══════════════════════════════════════════════════ */
const HN_DEPTOS=["Atlántida","Choluteca","Colón","Comayagua","Copán","Cortés","El Paraíso","Francisco Morazán","Gracias a Dios","Intibucá","Islas de la Bahía","La Paz","Lempira","Ocotepeque","Olancho","Santa Bárbara","Valle","Yoro"];
const PAISES=["Honduras","El Salvador","Guatemala","Nicaragua","Costa Rica","Panamá","México","Estados Unidos","España","Colombia","Venezuela","Otro"];

function Clientes({clientes,saveClientes,ventas,saveVentas,lotes,saveLotes,pagos,savePagos}){
  const [modal,  setModal]  = useState(null);
  const [search, setSearch] = useState("");
  const [form,   setForm]   = useState({});
  const [detail, setDetail] = useState(null);

  const blank={nombre:"",dni:"",telefono:"",telefono2:"",email:"",pais:"Honduras",ciudad:"",departamentoEstado:"El Paraíso",direccion:"",referencia:""};

  const openNew  = ()=>{setForm({...blank});setModal("new");};
  const openEdit = c=>{setForm({...c});setModal("edit");};

  const handleSave = ()=>{
    if(!form.nombre?.trim()) return alert("El nombre es obligatorio");
    modal==="new"
      ? saveClientes([...clientes,{...form,id:uid(),createdAt:today()}])
      : saveClientes(clientes.map(c=>c.id===form.id?{...form}:c));
    setModal(null);
  };

  /* FIX: cascade delete — borra ventas y pagos del cliente */
  const handleDelete = id=>{
    const ventasCliente = ventas.filter(v=>v.clienteId===id);
    const msg = ventasCliente.length>0
      ? `Este cliente tiene ${ventasCliente.length} contrato(s). ¿Eliminar cliente Y todos sus contratos/pagos?`
      : "¿Eliminar este cliente?";
    if(!confirm(msg)) return;
    const ventaIds = new Set(ventasCliente.map(v=>v.id));
    savePagos(pagos.filter(p=>!ventaIds.has(p.ventaId)));
    // liberar lotes
    saveLotes(lotes.map(l=>ventasCliente.some(v=>String(v.loteId)===String(l.id))?{...l,estado:"disponible"}:l));
    saveVentas(ventas.filter(v=>v.clienteId!==id));
    saveClientes(clientes.filter(c=>c.id!==id));
    setDetail(null);
  };

  const filtered=clientes.filter(c=>
    c.nombre?.toLowerCase().includes(search.toLowerCase())||
    c.dni?.includes(search)||c.telefono?.includes(search)
  );

  if(detail){
    const c=detail;
    const misVentas=ventas.filter(v=>v.clienteId===c.id);
    return(
      <div className="fade-in">
        <button className="btn btn-outline btn-sm" onClick={()=>setDetail(null)}>← Volver</button>
        <div style={{marginTop:16}}>
          <div className="section-title">{c.nombre}</div>
          <div className="card">
            <div className="detail-row"><span className="dk">DNI / RTN</span><span className="dv">{c.dni||"—"}</span></div>
            <div className="detail-row"><span className="dk">Teléfono</span><span className="dv">{c.telefono||"—"}</span></div>
            <div className="detail-row"><span className="dk">Teléfono 2</span><span className="dv">{c.telefono2||"—"}</span></div>
            <div className="detail-row"><span className="dk">Email</span><span className="dv">{c.email||"—"}</span></div>
            <div className="detail-row"><span className="dk">País</span><span className="dv">{c.pais||c.departamento||"—"}</span></div>
            <div className="detail-row"><span className="dk">Ciudad / Municipio</span><span className="dv">{c.ciudad||c.municipio||"—"}</span></div>
            <div className="detail-row"><span className="dk">Depto. / Estado</span><span className="dv">{c.departamentoEstado||c.departamento||"—"}</span></div>
            <div className="detail-row"><span className="dk">Dirección</span><span className="dv" style={{maxWidth:"58%",textAlign:"right"}}>{c.direccion||"—"}</span></div>
            <div className="detail-row"><span className="dk">Referencia</span><span className="dv" style={{maxWidth:"58%",textAlign:"right"}}>{c.referencia||"—"}</span></div>
            <div className="detail-row"><span className="dk">Registro</span><span className="dv">{fmtDate(c.createdAt)}</span></div>
          </div>
          <div className="section-title" style={{marginTop:10}}>Contratos ({misVentas.length})</div>
          {misVentas.map(v=>{
            const l=lotes.find(lt=>String(lt.id)===String(v.loteId));
            return(
              <div key={v.id} className="card">
                <div style={{fontWeight:700,color:"var(--gold)"}}>Lote {l?.numero||"—"}{l?.manzana?` · M.${l.manzana}`:""}</div>
                <div style={{fontSize:".79rem",color:"var(--muted)",marginTop:4}}>{l?.proyecto||""} · {fmtL(v.precio)} · {v.numCuotas} cuotas de {fmtL(v.montoCuota)}</div>
              </div>
            );
          })}
          <div style={{display:"flex",gap:10,marginTop:14,flexWrap:"wrap"}}>
            <button className="btn btn-gold" onClick={()=>{openEdit(c);setDetail(null);}}>Editar</button>
            <button className="btn btn-danger" onClick={()=>handleDelete(c.id)}>Eliminar</button>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div>
      <div className="section-title">Clientes <span style={{color:"var(--muted)",fontSize:".78rem"}}>{clientes.length}</span></div>
      <input className="search-box" placeholder="🔍  Nombre, DNI o teléfono..." value={search} onChange={e=>setSearch(e.target.value)}/>
      {filtered.length===0&&<div className="empty-state"><div className="icon">👤</div><p>No hay clientes registrados</p></div>}
      {filtered.map(c=>(
        <div key={c.id} className="list-item" onClick={()=>setDetail(c)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <h3>{c.nombre}</h3>
              <p>DNI: {c.dni||"—"} · {c.telefono||"Sin tel."}</p>
              <p style={{marginTop:2}}>{c.ciudad||c.municipio||""}{(c.ciudad||c.municipio)&&(c.departamentoEstado||c.departamento)?", ":""}{c.departamentoEstado||c.departamento||""}{c.pais&&c.pais!=="Honduras"?` · ${c.pais}`:""}</p>
            </div>
            <span className={`badge badge-${ventas.some(v=>v.clienteId===c.id)?"gold":"blue"}`}>
              {ventas.filter(v=>v.clienteId===c.id).length} contrato(s)
            </span>
          </div>
        </div>
      ))}
      <button className="fab no-print" onClick={openNew}>+</button>


      {(modal==="new"||modal==="edit")&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}>

            <div className="modal-title">
              {modal==="new"?"Nuevo Cliente":"Editar Cliente"}
              <button className="btn-icon" onClick={()=>setModal(null)}><Svg path={IC.x} size={17}/></button>
            </div>

/* ══════════════════════════════════════════════════

function Lotes({lotes,saveLotes,ventas,saveVentas,clientes,pagos,savePagos}){

  const [filter, setFilter] = useState("todos");
  const [form,   setForm]   = useState({});
  const [detail, setDetail] = useState(null);

  const blank={numero:"",manzana:"",proyecto:"Villa Panamericana Lotificadora",medidaM2:"",medidaV2:"",unidad:"varas²",valorVara:1007,prima:2000,cuotaMensual:2000,precio:"",estado:"disponible",colindancias:"",descripcion:""};
  const openNew  = ()=>{setForm({...blank});setModal("new");};
  const openEdit = l=>{setForm({...l});setModal("edit");};

  const handleSave = ()=>{
    if(!form.numero?.trim()) return alert("El número de lote es obligatorio");
    modal==="new"
      ? saveLotes([...lotes,{...form,id:uid(),createdAt:today()}])
      : saveLotes(lotes.map(l=>l.id===form.id?{...form}:l));
    setModal(null);
  };

  /* FIX: cascade delete lote → venta → pagos */
  const handleDelete = id=>{
    const ventaLote=ventas.find(v=>v.loteId===id);
    const msg=ventaLote?"Este lote tiene un contrato activo. ¿Eliminar lote, contrato y pagos asociados?":"¿Eliminar este lote?";
    if(!confirm(msg)) return;
    if(ventaLote){
      savePagos(pagos.filter(p=>p.ventaId!==ventaLote.id));
      saveVentas(ventas.filter(v=>v.id!==ventaLote.id));
    }
    saveLotes(lotes.filter(l=>l.id!==id));
    setDetail(null);
  };

  const badgeClass=e=>e==="disponible"?"badge-green":e==="vendido"?"badge-gold":e==="reservado"?"badge-orange":"badge-blue";
  const filtered=lotes.filter(l=>filter==="todos"||l.estado===filter);

  if(detail){
    const l=detail;
    const px=calcLotePrecios(l);
    const vnt=ventas.find(vn=>String(vn.loteId)===String(l.id));
    const cl=vnt?clientes.find(c=>c.id===vnt.clienteId):null;

      <div className="fade-in">

          </div>

            <div className="detail-row"><span className="dk">Proyecto</span><span className="dv">{l.proyecto||"—"}</span></div>

            <div className="detail-row"><span className="dk">Bloque</span><span className="dv">{l.manzana||"—"}</span></div>
            {px.m2>0&&<div className="detail-row"><span className="dk">Área M²</span><span className="dv">{px.m2} m²</span></div>}
            {px.v2>0&&<div className="detail-row"><span className="dk">Área V²</span><span className="dv">{px.v2} v²</span></div>}
            <div className="detail-row"><span className="dk">Valor por vara</span><span className="dv">{fmtL(px.vv)}</span></div>
            <div className="detail-row"><span className="dk">Total terreno</span><span className="dv" style={{color:"var(--gold)",fontWeight:700}}>{fmtL(px.total)}</span></div>
            <div className="detail-row"><span className="dk">Prima</span><span className="dv">{fmtL(px.pr)}</span></div>
            <div className="detail-row"><span className="dk">Subtotal (sin prima)</span><span className="dv">{fmtL(px.subtotal)}</span></div>
            <div className="detail-row"><span className="dk">Cuota mensual</span><span className="dv">{fmtL(px.cm)}</span></div>
            <div className="detail-row"><span className="dk">Cant. cuotas</span><span className="dv" style={{color:"var(--green)",fontWeight:700}}>{px.nCuotas}</span></div>
            {l.colindancias&&<div className="detail-row"><span className="dk">Colindancias</span><span className="dv" style={{maxWidth:"55%",textAlign:"right"}}>{l.colindancias}</span></div>}
          </div>
          {vnt&&cl&&(

        </div>

  return(

                      ?`¿Eliminar BLOQUE ${bloque} completo?\nTiene ${bLotes.length} lotes (${conContratos.length} con contratos).\nSe eliminarán también los contratos y pagos asociados.`

                    if(!confirm(msg)) return;
                    const ids=new Set(bLotes.map(l=>l.id));
                    const ventasIds=new Set(ventas.filter(v=>ids.has(v.loteId)).map(v=>v.id));
                    savePagos(pagos.filter(p=>!ventasIds.has(p.ventaId)));
                    saveVentas(ventas.filter(v=>!ventasIds.has(v.id)));
                    saveLotes(lotes.filter(l=>!ids.has(l.id)));
                  }}
                  style={{background:"rgba(224,82,82,.12)",border:"1px solid rgba(224,82,82,.3)",color:"var(--red)",borderRadius:6,padding:"2px 8px",fontSize:".72rem",cursor:"pointer",fontWeight:600}}
                >🗑 Bloque</button>

              {bLotes.map(l=>{
                const px=calcLotePrecios(l);
                return(
                  <div key={l.id} className="list-item" onClick={()=>setDetail(l)}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:3}}>

                          <span className={`badge ${badgeClass(l.estado)}`} style={{fontSize:".65rem"}}>{l.estado?.toUpperCase()}</span>
                        </div>
                        {px.v2>0&&<p style={{fontSize:".78rem",color:"var(--muted)"}}>{px.v2} v² {px.m2>0?`· ${px.m2} m²`:""}</p>}
                        <div style={{display:"flex",gap:14,marginTop:5,flexWrap:"wrap"}}>
                          <span style={{fontSize:".78rem"}}><span style={{color:"var(--muted)"}}>Total:</span> <span style={{color:"var(--gold)",fontWeight:700}}>{fmtL(px.total)}</span></span>
                          <span style={{fontSize:".78rem"}}><span style={{color:"var(--muted)"}}>Prima:</span> <span>{fmtL(px.pr)}</span></span>
                          <span style={{fontSize:".78rem"}}><span style={{color:"var(--muted)"}}>Cuota:</span> <span style={{color:"var(--green)",fontWeight:700}}>{fmtL(px.cm)} × {px.nCuotas}</span></span>
                        </div>
                      </div>
                    </div>

                );
              })}

      })()}
      <button className="fab no-print" onClick={openNew}>+</button>

      {modal==="listaPDF"&&(
        <div className="modal-overlay" style={{zIndex:3000}} onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div style={{width:"100%",maxWidth:900,maxHeight:"95vh",overflowY:"auto"}}>
            <ListaPreciosPDF lotes={lotes} onClose={()=>setModal(null)}/>
          </div>
        </div>
      )}
      {modal==="importSL3"&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal" style={{maxWidth:700}}>
            <div className="modal-title">
              📋 Cargar Lotes — San Lorenzo 3
              <button className="btn-icon" onClick={()=>setModal(null)}><Svg path={IC.x} size={17}/></button>
            </div>
            <ImportLotesSL3 lotes={lotes} saveLotes={saveLotes} onClose={()=>setModal(null)}/>
          </div>
        </div>
      )}

      {(modal==="new"||modal==="edit")&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}>

            <div className="modal-title">
              {modal==="new"?"Nuevo Lote":"Editar Lote"}

              <div className="form-group"><label>Área M²</label><input type="number" value={form.medidaM2||form.medida||""} onChange={e=>setForm({...form,medidaM2:e.target.value})} placeholder="0.00"/></div>
              <div className="form-group"><label>Área V² (varas²)</label><input type="number" value={form.medidaV2||""} onChange={e=>setForm({...form,medidaV2:e.target.value})} placeholder="0.00"/></div>

                  <option value="reservado">Reservado</option>
                  <option value="vendido">Vendido</option>

            {(()=>{

              const _mzF=(form.manzana||'').toString().trim().toUpperCase();

              const vv=Number(form.valorVara||_vvDef);
              const pr=Number(form.prima||2000);
              if(!v2) return null;
              const tot=v2*vv; const {nCuotas:nc,cuota:cm}=calcCuotaLogic(tot);
              return <div className="card" style={{borderColor:"var(--gold)",padding:12,marginBottom:10}}>

                <div style={{display:"flex",gap:16,flexWrap:"wrap",fontSize:".82rem"}}>
                  <span><span style={{color:"var(--muted)"}}>Total:</span> <b style={{color:"var(--gold)"}}>{fmtL(tot)}</b></span>
                  <span><span style={{color:"var(--muted)"}}>Subtotal:</span> <b>{fmtL(sub)}</b></span>
                  <span><span style={{color:"var(--muted)"}}>Cuotas:</span> <b style={{color:"var(--green)"}}>{nc}</b></span>

function Ventas({ventas,saveVentas,clientes,lotes,saveLotes,pagos,savePagos}){

  const cuotaEst = calcCuotaFn(form.precio,form.prima,form.numCuotas);

    if(!form.clienteId) return alert("Seleccione un cliente");

    setTimeout(()=>setRecibo({ventaId:nv.id}),150);

  const handleSaveEdit = ()=>{
    if(!form.precio) return alert("Ingrese el precio");

    saveVentas(ventas.filter(x=>x.id!==id));
    setDetail(null);
  };

    const cl=clientes.find(c=>c.id===v.clienteId);

    return !q||cl?.nombre?.toLowerCase().includes(q)||lt?.numero?.includes(q)||lt?.proyecto?.toLowerCase().includes(q);
  });

  if(recibo) return <Recibo recibo={recibo} clientes={clientes} lotes={lotes} ventas={ventas} pagos={pagos} onClose={()=>setRecibo(null)}/>;

  if(detail){
    const v=detail;
    const cl=clientes.find(c=>c.id===v.clienteId);
    const lt=lotes.find(l=>String(l.id)===String(v.loteId));
    const pv=pagos.filter(p=>p.ventaId===v.id);
    const tp=pv.reduce((s,p)=>s+Number(p.monto),0);
    const sp=Number(v.precio)-tp;
    const pct=Math.min(100,(tp/Number(v.precio||1))*100);
    const cuotas=generarCuotas(v);
    return(
      <div className="fade-in">

          {(!lt && !v.loteBloque) && (
            <div className="card" style={{borderColor:"var(--orange)",marginBottom:8,padding:10}}>
              <div style={{color:"var(--orange)",fontWeight:700,marginBottom:6}}>⚠️ Lote no vinculado — selecciona para reparar:</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                <select defaultValue="" style={{flex:1,padding:"6px 8px",borderRadius:6,border:"1px solid var(--border)",background:"var(--card)",color:"var(--text)"}}
                  onChange={e=>{
                    const lid=e.target.value;
                    if(!lid) return;
                    const lo=lotes.find(x=>x.id===lid);
                    if(!lo) return;
                    const fixed={...v,loteId:lo.id,loteNumero:lo.numero,loteBloque:lo.manzana};
                    saveVentas(ventas.map(x=>x.id===v.id?fixed:x));
                    setDetail(fixed);
                  }}>
                  <option value="">— Seleccionar lote —</option>
                  {[...new Set(lotes.map(l=>l.manzana))].sort().map(mz=>(
                    <optgroup key={mz} label={`Bloque ${mz}`}>
                      {lotes.filter(l=>l.manzana===mz).map(l=><option key={l.id} value={l.id}>Lote {l.numero} · {l.descripcion}</option>)}
                    </optgroup>
                  ))}
                </select>
              </div>
            </div>
          )}
          <div className="card">
            <div className="detail-row"><span className="dk">Cliente</span><span className="dv">{cl?.nombre||"—"}</span></div>
            <div className="detail-row"><span className="dk">DNI / RTN</span><span className="dv">{cl?.dni||"—"}</span></div>
            <div className="detail-row"><span className="dk">Teléfono</span><span className="dv">{cl?.telefono||"—"}</span></div>
            <div className="detail-row"><span className="dk">Proyecto</span><span className="dv">Villa Panamericana Lotificadora</span></div>
            <div className="detail-row"><span className="dk">Bloque</span><span className="dv">{lt?.manzana||v.loteBloque||"—"}</span></div>
            <div className="detail-row"><span className="dk">Lote</span><span className="dv">{lt?.numero||v.loteNumero||"—"}</span></div>
            <div className="detail-row"><span className="dk">Precio total</span><span className="dv" style={{color:"var(--gold)"}}>{fmtL(v.precio)}</span></div>
            <div className="detail-row"><span className="dk">Prima</span><span className="dv">{fmtL(v.prima)}</span></div>
            {v.fechaPrima&&<div className="detail-row"><span className="dk">Fecha pago prima</span><span className="dv">{fmtDate(v.fechaPrima)}</span></div>}
            <div className="detail-row"><span className="dk">Cuotas</span><span className="dv">{(()=>{const _prP=pv.some(p=>p.tipo==="prima");const _nc=Number(v.numCuotas||0)-(_prP?1:0);return `${_nc} × ${fmtL(v.montoCuota)}`;})()}</span></div>
            <div className="detail-row"><span className="dk">Fecha inicio</span><span className="dv">{fmtDate(v.fechaInicio)}</span></div>
            {v.estadoCivil&&<div className="detail-row"><span className="dk">Estado civil</span><span className="dv">{v.estadoCivil}</span></div>}
            {v.notas&&<div className="detail-row"><span className="dk">Notas</span><span className="dv" style={{maxWidth:"60%",textAlign:"right"}}>{v.notas}</span></div>}
          </div>

          <div className="card" style={{borderColor:"var(--gold)"}}>
            <div style={{fontWeight:700,color:"var(--gold)",marginBottom:8}}>Estado del contrato</div>
            <div className="progress-wrap"><div className="progress-fill" style={{width:`${pct}%`}}/></div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:".78rem",marginTop:5}}>
              <span style={{color:"var(--green)"}}>Pagado: {fmtL(tp)}</span>
              <span style={{color:"var(--muted)"}}>{pct.toFixed(1)}%</span>
            </div>
            <div className="detail-row" style={{marginTop:8}}><span className="dk">Saldo pendiente</span><span className="dv" style={{color:sp>0?"var(--red)":"var(--green)"}}>{fmtL(Math.max(0,sp))}</span></div>
            <div className="detail-row"><span className="dk">Cuotas pagadas</span><span className="dv" style={{fontWeight:700}}>{(()=>{const _nC=pv.filter(p=>p.tipo==="cuota").length;const _ap=pv.filter(p=>p.tipo==="adelanto_parcial").reduce((s,p)=>s+Number(p.monto),0);const _apC=Math.floor(_ap/2000);const _tP=pv.some(p=>p.tipo==="prima");const _total=_nC+_apC;const _denom=Number(v.numCuotas||0)-(_tP?1:0);return _apC>0?`${_total} / ${_denom} (incl. ${_apC} de abonos)`:`${_nC} / ${_denom}`;})()}</span></div>
          </div>

          {/* ── SALDO A FAVOR (abonos parciales acumulados) ── */}
          {(()=>{
            const _ap = pv.filter(p=>p.tipo==="adelanto_parcial");
            const _acum = _ap.reduce((s,p)=>s+Number(p.monto),0);
            if(_ap.length===0) return null;
            const _cub = Math.floor(_acum/2000);
            const _rest = _acum % 2000;
            return(
              <div className="card" style={{borderColor:"var(--green)",padding:12,marginTop:4}}>
                <div style={{fontWeight:700,color:"var(--green)",marginBottom:8,fontSize:".85rem"}}>💰 Saldo a Favor (abonos parciales)</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  <div style={{background:"var(--card2)",borderRadius:8,padding:"8px 12px",flex:1}}>
                    <div style={{fontSize:".68rem",color:"var(--muted)"}}>Total acumulado</div>
                    <div style={{fontFamily:"Playfair Display,serif",fontSize:"1.2rem",color:"var(--green)",fontWeight:700}}>{fmtL(_acum)}</div>
                  </div>
                  <div style={{background:"var(--card2)",borderRadius:8,padding:"8px 12px",flex:1}}>
                    <div style={{fontSize:".68rem",color:"var(--muted)"}}>Cuotas cubiertas</div>
                    <div style={{fontSize:"1.2rem",fontWeight:700,color:"var(--green)"}}>{_cub}</div>
                  </div>
                  <div style={{background:"var(--card2)",borderRadius:8,padding:"8px 12px",flex:1}}>
                    <div style={{fontSize:".68rem",color:"var(--muted)"}}>Falta para próxima</div>
                    <div style={{fontSize:"1.2rem",fontWeight:700,color:_rest>0?"var(--gold)":"var(--muted)"}}>{fmtL(2000-_rest)}</div>
                  </div>
                </div>
                {_ap.length>0&&<div style={{fontSize:".7rem",color:"var(--muted)",marginTop:6}}>{_ap.length} abono{_ap.length>1?"s":""} parcial{_ap.length>1?"es":""} registrado{_ap.length>1?"s":""}</div>}
              </div>
            );
          })()}

          <div className="section-title" style={{marginTop:4}}>Historial de Pagos</div>
          {pv.length===0&&<div style={{color:"var(--muted)",fontSize:".82rem",padding:"8px 0"}}>Sin pagos registrados</div>}
          {[...pv].reverse().map(p=>(
            <div key={p.id} className="cuota-row">
              <span className="cuota-num">{p.tipo==="cuota"?`#${p.numCuota}`:p.tipo==="prima"?"P":p.tipo==="plano"?"PL":p.tipo==="adelanto_parcial"?"AB":"A"}</span>
              <div style={{flex:1,marginLeft:10}}>
                <div style={{fontSize:".85rem",fontWeight:700,color:"var(--green)"}}>{fmtL(p.monto)}</div>
                <div style={{fontSize:".74rem",color:"var(--muted)"}}>{fmtDate(p.fecha)} · {p.tipo==="cuota"?`Cuota #${p.numCuota}`:p.tipo==="prima"?"Prima":p.tipo==="plano"?"Pago de Plano":p.tipo==="adelanto"?"Adelanto":p.tipo==="adelanto_parcial"?"Abono parcial":"Mora"}</div>
                {p.nota&&<div style={{fontSize:".72rem",color:"var(--muted)"}}>{p.nota}</div>}
              </div>
              <div style={{display:"flex",gap:4,flexShrink:0}}>
                <button className="btn-icon" title="PDF Recibo" onClick={()=>{
                  const _pvH=pv.slice(0,pv.indexOf(p)+1);
                  const _tp=_pvH.reduce((s,x)=>s+Number(x.monto),0);
                  const _sp=Math.max(0,Number(v.precio)-_tp);
                  const _cq=_pvH.filter(x=>x.tipo==="cuota").length;
                  const _prP=_pvH.some(x=>x.tipo==="prima");
                  const _den=Number(v.numCuotas||0)-(_prP?1:0);
                  const _rn=`REC-${p.id.slice(-6).toUpperCase()}`;
                  const _tel=cl?.telefono?.replace(/\D/g,"");
                  const _tipo=p.tipo==="cuota"?`Cuota #${p.numCuota}`:p.tipo==="prima"?"Prima":p.tipo;
                  const _msg=`Hola ${cl?.nombre||""}, su pago fue registrado.\nN° Recibo: ${_rn}\nProyecto: Villa Panamericana Lotificadora\nLote: ${lt?.numero||v.loteNumero||""} · Bloque: ${lt?.manzana||v.loteBloque||""}\nTipo: ${_tipo}\nMonto: L.${Number(p.monto).toLocaleString("es-HN")}\nSaldo pendiente: L.${_sp.toLocaleString("es-HN")}\nGracias por su pago!`;
                  generarReciboWA({cl,lt,venta:v,pago:p,pagoIds:[p.id],pagos:pv,montoRecibo:Number(p.monto),tp:_tp,sp:_sp,cuotasPagadas:_cq,denomCuotas:_den,reciboNum:_rn,esMultiple:false,telCliente:_tel,msgWA:_msg});
                }}>
                  <Svg path={IC.print} size={16}/>
                </button>
                {cl?.telefono&&<button className="btn-icon" title="Solo WhatsApp" style={{background:"#075e54",color:"#25d366"}} onClick={()=>{
                  const _pvH=pv.slice(0,pv.indexOf(p)+1);
                  const _sp=Math.max(0,Number(v.precio)-_pvH.reduce((s,x)=>s+Number(x.monto),0));
                  const _rn=`REC-${p.id.slice(-6).toUpperCase()}`;
                  const _tel=cl.telefono.replace(/\D/g,"");
                  const _tipo=p.tipo==="cuota"?`Cuota #${p.numCuota}`:p.tipo==="prima"?"Prima":p.tipo;
                  const _msg=`Hola ${cl.nombre||""}, su pago fue registrado.\nN° Recibo: ${_rn}\nProyecto: Villa Panamericana Lotificadora\nLote: ${lt?.numero||v.loteNumero||""} · Bloque: ${lt?.manzana||v.loteBloque||""}\nTipo: ${_tipo}\nMonto: L.${Number(p.monto).toLocaleString("es-HN")}\nSaldo pendiente: L.${_sp.toLocaleString("es-HN")}\nGracias por su pago!`;
                  window.open(`https://wa.me/${_tel}?text=${encodeURIComponent(_msg)}`,'_blank');
                }}>
                  <span style={{fontSize:13}}>📲</span>
                </button>}
              </div>
            </div>
          ))}

          <div style={{display:"flex",gap:10,marginTop:16,flexWrap:"wrap"}}>
            <button className="btn btn-gold" onClick={()=>{const ult=pv[pv.length-1];setRecibo(ult?{pagoId:ult.id}:{ventaId:v.id});}}>🖨 Recibo último pago</button>
            <button className="btn btn-gold" style={{background:"#1a3a1a"}} onClick={()=>setModal("contrato")}>📄 Contrato PDF</button>
            <button className="btn btn-gold" style={{background:"#1a2a3a"}} onClick={()=>setModal("adelanto")}>💳 Pago Adelantado</button>
            <button className="btn btn-outline" onClick={()=>{setForm({...v});setModal("edit");}}>
              <Svg path={IC.edit} size={16}/> Editar
            </button>
            <button className="btn btn-danger btn-sm" onClick={()=>handleDelete(v.id)}>Eliminar</button>
          </div>
        </div>

        {modal==="edit"&&(
          <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
            <div className="modal">
              <div className="modal-title">Editar Contrato <button className="btn-icon" onClick={()=>setModal(null)}><Svg path={IC.x} size={17}/></button></div>
              <div className="form-row">
                <div className="form-group"><label>Precio venta (L.)</label><input type="number" value={form.precio||""} onChange={e=>setForm({...form,precio:e.target.value})}/></div>
                <div className="form-group"><label>Prima</label><input type="number" value={form.prima||""} onChange={e=>setForm({...form,prima:e.target.value})}/></div>
              </div>
              <div className="form-row">
                <div className="form-group"><label>N° Cuotas</label><input type="number" value={form.numCuotas||""} onChange={e=>setForm({...form,numCuotas:e.target.value})}/></div>
                <div className="form-group"><label>Fecha pago prima</label><input type="date" value={form.fechaPrima||today()} onChange={e=>setForm({...form,fechaPrima:e.target.value})}/></div>
              </div>
              <div className="card" style={{borderColor:"var(--gold)",padding:12,marginBottom:12}}>
                <div style={{fontSize:".7rem",color:"var(--muted)"}}>Nueva cuota estimada</div>
                <div style={{fontFamily:"Playfair Display,serif",fontSize:"1.4rem",color:"var(--gold)",fontWeight:700}}>{fmtL(calcCuotaFn(form.precio,form.prima,form.numCuotas))}</div>
              </div>
              <div className="form-row">
                <div className="form-group"><label>Estado civil</label>
                  <select value={form.estadoCivil||""} onChange={e=>setForm({...form,estadoCivil:e.target.value})}>
                    <option value="">—</option>
                    <option value="soltero(a)">Soltero(a)</option>
                    <option value="casado(a)">Casado(a)</option>
                    <option value="unión libre">Unión libre</option>
                    <option value="divorciado(a)">Divorciado(a)</option>
                    <option value="viudo(a)">Viudo(a)</option>
                  </select>
                </div>
                <div className="form-group"><label>Estado contrato</label>
                  <select value={form.estado||"activa"} onChange={e=>setForm({...form,estado:e.target.value})}>
                    <option value="activa">Activa</option>
                    <option value="cancelada">Cancelada</option>
                    <option value="mora">En mora</option>
                  </select>
                </div>
              </div>
              <div className="form-group"><label>Domicilio del comprador</label><input value={form.domicilio||""} onChange={e=>setForm({...form,domicilio:e.target.value})} placeholder="Ciudad, País"/></div>
              <div className="form-group"><label>Beneficiario 1</label><input value={form.beneficiario1||""} onChange={e=>setForm({...form,beneficiario1:e.target.value})} placeholder="Primer nombre completo"/></div>
              <div className="form-group"><label>Beneficiario 2</label><input value={form.beneficiario2||""} onChange={e=>setForm({...form,beneficiario2:e.target.value})} placeholder="Segundo nombre completo (opcional)"/></div>
              <div className="form-group"><label>Notas</label><textarea value={form.notas||""} onChange={e=>setForm({...form,notas:e.target.value})}/></div>
              <div style={{display:"flex",gap:10}}>
                <button className="btn btn-gold" style={{flex:1}} onClick={handleSaveEdit}>Guardar cambios</button>
                <button className="btn btn-outline" onClick={()=>setModal(null)}>Cancelar</button>
              </div>
            </div>
          </div>
        )}
        {modal==="contrato"&&(
          <ContratoModal venta={v} cliente={cl} lote={lt} pagos={pv} onClose={()=>setModal(null)}/>
        )}
        {modal==="adelanto"&&(
          <ModalAdelanto
            venta={v} cliente={cl} lote={lt} pagos={pv}
            savePagos={savePagos} allPagos={pagos}
            onClose={()=>setModal(null)}
            onRecibo={(ids)=>{setModal(null);setTimeout(()=>setRecibo({pagoIds:ids}),100);}}
          />
        )}
      </div>
    );
  }

  return(
    <div>
      <div className="section-title">Contratos <span style={{color:"var(--muted)",fontSize:".78rem"}}>{ventas.length}</span></div>
      <input className="search-box" placeholder="🔍  Buscar cliente o lote..." value={search} onChange={e=>setSearch(e.target.value)}/>
      {filteredV.length===0&&<div className="empty-state"><div className="icon">📋</div><p>No hay contratos registrados</p></div>}
      {filteredV.map(v=>{
        const cl=clientes.find(c=>c.id===v.clienteId);
        const lt=lotes.find(l=>String(l.id)===String(v.loteId));
        const pv=pagos.filter(p=>p.ventaId===v.id);
        const tp=pv.reduce((s,p)=>s+Number(p.monto),0);
        const pct=Math.min(100,(tp/Number(v.precio||1))*100);
        const cuotas=generarCuotas(v);
        const nextDue=cuotas.find(c=>!pv.some(p=>p.tipo==="cuota"&&Number(p.numCuota)===c.num));
        return(
          <div key={v.id} className="list-item" onClick={()=>setDetail(v)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <h3>{cl?.nombre||"Cliente no encontrado"}</h3>
                <p>Lote {lt?.numero||"—"}{lt?.manzana?` · M.${lt.manzana}`:""} · {lt?.proyecto||""}</p>
                <p style={{color:"var(--gold)",fontWeight:700,marginTop:4}}>{fmtL(v.precio)} · {v.numCuotas} cuotas</p>
                <div className="progress-wrap" style={{marginTop:8}}><div className="progress-fill" style={{width:`${pct}%`}}/></div>
                <div style={{fontSize:".74rem",color:"var(--muted)",marginTop:3}}>
                  {pct.toFixed(0)}% pagado · {fmtL(tp)}{nextDue?` · Próx: ${fmtDate(nextDue.fecha)}`:""}
                </div>
              </div>
              <span className={`badge badge-${v.estado==="activa"?"green":v.estado==="mora"?"red":"gold"}`}>{v.estado?.toUpperCase()}</span>
            </div>
          </div>
        );
      })}
      <button className="fab no-print" onClick={()=>{setForm({...blankForm});setModal("new");}}>+</button>

      {modal==="new"&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal">
            <div className="modal-title">Nuevo Contrato <button className="btn-icon" onClick={()=>setModal(null)}><Svg path={IC.x} size={17}/></button></div>
            <div className="form-group"><label>Cliente *</label>
              <select value={form.clienteId||""} onChange={e=>setForm({...form,clienteId:e.target.value})}>
                <option value="">— Seleccionar cliente —</option>
                {clientes.map(c=><option key={c.id} value={c.id}>{c.nombre} · {c.dni||"Sin DNI"}</option>)}
              </select>
            </div>
            <div className="form-row">
              <div className="form-group"><label>Bloque</label>
                <select value={bloqueFilter} onChange={e=>{setBloqueFilter(e.target.value);setForm(f=>({...f,loteId:""}));}}>
                  <option value="">— Todos —</option>
                  {[...new Set(lotes.filter(l=>l.estado!=="vendido"&&l.manzana).map(l=>l.manzana))].sort().map(b=>(
                    <option key={b} value={b}>Bloque {b}</option>
                  ))}
                </select>
              </div>
              <div className="form-group"><label>Lote *</label>
                <select value={form.loteId||""} onChange={e=>{
                  const _val=e.target.value;
                  // Siempre actualizar loteId primero (evita que el select revierta)
                  setForm(f=>{
                    try{
                      const _l=lotes.find(x=>String(x.id)===String(_val));
                      if(_l){
                        const _px=calcLotePrecios(_l);
                        const _p=_px.total>0?Math.round(_px.total):Number(_l.precio||0);
                        const _pr=Number(_l.prima||_px.pr||0);
                        const {nCuotas:_nc,cuota:_cm,prima:_prCalc}=calcCuotaLogic(_p>0?_p:0);
                        const _primaFinal=Number(_pr)||_prCalc;
                        return {...f,loteId:_val,precio:_p>0?String(_p):f.precio,prima:String(_primaFinal),numCuotas:String(_nc),cuotaMensual:String(_cm)};
                      }
                    }catch(e){}
                    return {...f,loteId:_val};
                  });
                }}>
                  <option value="">— Seleccionar lote —</option>
                  {lotes.filter(l=>l.estado!=="vendido"&&(!bloqueFilter||l.manzana===bloqueFilter)).map(l=>{
                    const px=calcLotePrecios(l);
                    return <option key={l.id} value={l.id}>Lote {l.numero}{l.manzana?` · Bloque ${l.manzana}`:""} · {fmtL(px.total||l.precio)}</option>;
                  })}
                </select>
              </div>
            </div>
            <div className="form-row">
              <div className="form-group"><label>Precio venta (L.) *</label><input type="number" value={form.precio||""} onChange={e=>setForm({...form,precio:e.target.value})}/></div>
              <div className="form-group"><label>Prima / Enganche</label><input type="number" value={form.prima||""} onChange={e=>setForm({...form,prima:e.target.value})} placeholder="0"/></div>
            </div>
            <div className="form-row">
              <div className="form-group"><label>N° Cuotas</label><input type="number" value={form.numCuotas||""} onChange={e=>setForm({...form,numCuotas:e.target.value})}/></div>
              <div className="form-group"><label>Fecha pago prima</label><input type="date" value={form.fechaPrima||today()} onChange={e=>setForm({...form,fechaPrima:e.target.value})}/></div>
            </div>
            {form.precio&&(
              <div className="card" style={{borderColor:"var(--gold)",marginBottom:12,padding:12}}>
                <div style={{fontSize:".7rem",color:"var(--muted)"}}>Cuota mensual estimada</div>
                <div style={{fontFamily:"Playfair Display,serif",fontSize:"1.5rem",color:"var(--gold)",fontWeight:700}}>{fmtL(cuotaEst)}</div>
                <div style={{fontSize:".74rem",color:"var(--muted)",marginTop:3}}>Saldo a financiar: {fmtL(Number(form.precio||0)-Number(form.prima||0))}</div>
              </div>
            )}
            <div className="form-group"><label>Fecha de firma</label><input type="date" value={form.fechaInicio||today()} onChange={e=>setForm({...form,fechaInicio:e.target.value})}/></div>
            <div className="form-row">
              <div className="form-group"><label>Estado civil</label>
                <select value={form.estadoCivil||""} onChange={e=>setForm({...form,estadoCivil:e.target.value})}>
                  <option value="">—</option>
                  <option value="soltero(a)">Soltero(a)</option>
                  <option value="casado(a)">Casado(a)</option>
                  <option value="unión libre">Unión libre</option>
                  <option value="divorciado(a)">Divorciado(a)</option>
                  <option value="viudo(a)">Viudo(a)</option>
                </select>
              </div>
              <div className="form-group"><label>Domicilio</label><input value={form.domicilio||""} onChange={e=>setForm({...form,domicilio:e.target.value})} placeholder="Ciudad, País"/></div>
            </div>
            <div className="form-group"><label>Beneficiario 1</label><input value={form.beneficiario1||""} onChange={e=>setForm({...form,beneficiario1:e.target.value})} placeholder="Primer nombre completo"/></div>
              <div className="form-group"><label>Beneficiario 2</label><input value={form.beneficiario2||""} onChange={e=>setForm({...form,beneficiario2:e.target.value})} placeholder="Segundo nombre completo (opcional)"/></div>
            <div className="form-group"><label>Notas del contrato</label><textarea value={form.notas||""} onChange={e=>setForm({...form,notas:e.target.value})}/></div>
            <div style={{display:"flex",gap:10}}>
              <button className="btn btn-gold" style={{flex:1}} onClick={handleSaveNew}>Crear Contrato</button>
              <button className="btn btn-outline" onClick={()=>setModal(null)}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════
   PAGOS
══════════════════════════════════════════════════ */
function PagosView({pagos,savePagos,ventas,clientes,lotes}){
  const [modal, setModal] = useState(false);
  const [form,  setForm]  = useState({ventaId:"",tipo:"cuota",numCuota:"",monto:"",fecha:today(),nota:""});
  const [filter,setFilter]= useState("todos");
  const [recibo,setRecibo]= useState(null);

  const cuotasPendientes = ventaId=>{
    const v=ventas.find(x=>x.id===ventaId);
    if(!v) return [];
    return generarCuotas(v).filter(c=>!pagos.some(p=>p.ventaId===ventaId&&p.tipo==="cuota"&&Number(p.numCuota)===c.num));
  };

  const handleSave = ()=>{
    if(!form.ventaId) return alert("Seleccione un contrato");
    if(!form.monto)   return alert("Ingrese el monto");
    savePagos([...pagos,{...form,id:uid(),createdAt:today()}]);
    setModal(false);
    setForm({ventaId:"",tipo:"cuota",numCuota:"",monto:"",fecha:today(),nota:""});
  };

  const handleDelete = id=>{
    if(!confirm("¿Eliminar este pago? El saldo del contrato se actualizará.")) return;
    savePagos(pagos.filter(p=>p.id!==id));
  };

  const mesActual=today().slice(0,7);
  const filtered=filter==="mes"?pagos.filter(p=>p.fecha?.startsWith(mesActual)):filter==="cuota"?pagos.filter(p=>p.tipo==="cuota"):pagos;
  const totalFiltrado=filtered.reduce((s,p)=>s+Number(p.monto),0);

  if(recibo) return <Recibo recibo={recibo} clientes={clientes} lotes={lotes} ventas={ventas} pagos={pagos} onClose={()=>setRecibo(null)}/>;

  return(
    <div>
      <div className="section-title">Registro de Pagos <span style={{color:"var(--muted)",fontSize:".78rem"}}>{pagos.length}</span></div>
      <div className="tabs">
        {[["todos","Todos"],["mes","Este mes"],["cuota","Cuotas"]].map(([f,l])=>(
          <button key={f} className={`tab${filter===f?" active":""}`} onClick={()=>setFilter(f)}>{l}</button>
        ))}
      </div>
      {filtered.length>0&&(
        <div className="card" style={{borderColor:"var(--green)",padding:"10px 14px",marginBottom:12}}>
          <div style={{fontSize:".7rem",color:"var(--muted)"}}>Total en vista</div>
          <div style={{fontFamily:"Playfair Display,serif",fontSize:"1.3rem",color:"var(--green)",fontWeight:700}}>{fmtL(totalFiltrado)}</div>
        </div>
      )}
      {filtered.length===0&&<div className="empty-state"><div className="icon">💵</div><p>No hay pagos en esta categoría</p></div>}
      {[...filtered].reverse().map(p=>{
        const v=ventas.find(x=>x.id===p.ventaId);
        const cl=v?clientes.find(c=>c.id===v.clienteId):null;
        const lt=v?lotes.find(l=>String(l.id)===String(v.loteId)):null;
        return(
          <div key={p.id} className="list-item" style={{cursor:"default"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <h3 style={{color:"var(--green)"}}>{fmtL(p.monto)}</h3>
                <p>{cl?.nombre||"—"} · Lote {lt?.numero||"—"}</p>
                <p style={{marginTop:2}}>{fmtDate(p.fecha)} · {p.tipo==="prima"?"Prima":p.tipo==="cuota"?`Cuota #${p.numCuota||"?"}`:p.tipo==="plano"?"Pago de Plano":p.tipo}</p>
                {p.nota&&<p style={{color:"var(--muted)",marginTop:2}}>{p.nota}</p>}
              </div>
              <div style={{display:"flex",gap:6,flexShrink:0}}>
                <button className="btn-icon" title="Imprimir recibo" onClick={()=>setRecibo({pagoId:p.id})}><Svg path={IC.print} size={17}/></button>
                <button className="btn-icon" style={{color:"var(--red)",borderColor:"rgba(224,82,82,.3)"}} title="Eliminar pago" onClick={()=>handleDelete(p.id)}>
                  <Svg path={IC.trash} size={17}/>
                </button>
              </div>
            </div>
          </div>
        );
      })}
      <button className="fab no-print" onClick={()=>setModal(true)}>+</button>

      {modal&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(false)}>
          <div className="modal">
            <div className="modal-title">Registrar Pago <button className="btn-icon" onClick={()=>setModal(false)}><Svg path={IC.x} size={17}/></button></div>
            <div className="form-group"><label>Contrato / Cliente *</label>
              <select value={form.ventaId} onChange={e=>setForm({...form,ventaId:e.target.value,numCuota:""})}>
                <option value="">— Seleccionar —</option>
                {ventas.map(v=>{
                  const c=clientes.find(x=>x.id===v.clienteId);
                  const l=lotes.find(x=>String(x.id)===String(v.loteId));
                  return <option key={v.id} value={v.id}>{c?.nombre||"?"} · Lote {l?.numero||"?"}</option>;
                })}
              </select>
            </div>
            <div className="form-row">
              <div className="form-group"><label>Tipo de pago</label>
                <select value={form.tipo} onChange={e=>setForm({...form,tipo:e.target.value,numCuota:""})}>
                  <option value="cuota">Cuota mensual</option>
                  <option value="prima">Prima / Enganche</option>
                  <option value="plano">Pago de Plano</option>
                  <option value="adelanto">Adelanto</option>
                  <option value="multa">Mora / Recargo</option>
                </select>
              </div>
              {/* FIX: solo mostrar selector cuota cuando tipo=cuota */}
              {form.tipo==="cuota"&&form.ventaId&&(
                <div className="form-group"><label>N° Cuota</label>
                  <select value={form.numCuota} onChange={e=>{
                    const cp=cuotasPendientes(form.ventaId).find(c=>c.num===Number(e.target.value));
                    setForm({...form,numCuota:e.target.value,monto:cp?String(cp.monto):form.monto});
                  }}>
                    <option value="">—</option>
                    {cuotasPendientes(form.ventaId).map(c=>(
                      <option key={c.num} value={c.num}>#{c.num} · {fmtDate(c.fecha)} · {fmtL(c.monto)}</option>
                    ))}
                  </select>
                </div>
              )}
            </div>
            <div className="form-row">
              <div className="form-group"><label>Monto (L.) *</label><input type="number" value={form.monto} onChange={e=>setForm({...form,monto:e.target.value})}/></div>
              <div className="form-group"><label>Fecha pago</label><input type="date" value={form.fecha} onChange={e=>setForm({...form,fecha:e.target.value})}/></div>
            </div>
            <div className="form-group"><label>Nota / Referencia</label><input value={form.nota} onChange={e=>setForm({...form,nota:e.target.value})} placeholder="Ej: Transferencia BAC #12345"/></div>
            <div style={{display:"flex",gap:10}}>
              <button className="btn btn-gold" style={{flex:1}} onClick={handleSave}>Guardar Pago</button>
              <button className="btn btn-outline" onClick={()=>setModal(false)}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
